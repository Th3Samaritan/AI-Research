<script>

const ITOS = DATA.itos, N = DATA.N, V = 27;
const labelOf = i => ITOS[i] === '.' ? '.' : ITOS[i];

/* row-normalized probabilities with +1 smoothing (the model) */
const P = N.map(row => { const s = row.reduce((a, b) => a + b + 1, 0); return row.map(c => (c + 1) / s); });
/* average negative log-likelihood over the whole training set, computed straight from the counts */
let TOT = 0, NLL = 0;
for (let i = 0; i < V; i++) for (let j = 0; j < V; j++) { TOT += N[i][j]; NLL += N[i][j] * -Math.log(P[i][j]); }
const AVG_NLL = NLL / TOT;
const MAXLOG = Math.log(Math.max(...N.flat()) + 1);

const STAGES = [
  { id:0, name:"The count table", title:"Count every pair of characters",
    desc:"From 32,000 names we tally how often each character follows each other — a 27×27 table (26 letters + the boundary token '.'). Brighter = more frequent. Row = current character, column = the next one." },
  { id:1, name:"Row → probability", title:"Normalize a row into a distribution",
    desc:"Pick a current character (left) and its row of counts becomes P(next | current): divide each count by the row total so the 27 numbers sum to 1. That bar chart is everything the model knows after seeing one character." },
  { id:2, name:"Generate a name", title:"Sample, hop, repeat",
    desc:"Start at '.', sample the next character from the current row's distribution, append it, move to that character's row, and repeat until '.' is drawn. Watch a name appear one hop at a time." },
  { id:3, name:"How good is it?", title:"The loss, and the neural twin",
    desc:"Score the model with the average negative log-likelihood over all the data. The very same model can be written as a 1-layer neural net (one-hot × W → softmax) trained by gradient descent — it reaches the same loss." },
];

/* ---- control ---- */
let RUN=0,PAUSED=false,SPEED=1,RUNNING=false,SKIP=false;
let state={stage:0,cur:0,gen:[]};
const REDUCED=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const $=id=>document.getElementById(id);
const fx=(x,p=2)=>{const v=(+x).toFixed(p);return v==="-0.00"?"0.00":v;};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function step(ms,run){if(SKIP){if(run!==RUN)throw"cancel";return;}let rem=ms/SPEED;while(rem>0){if(run!==RUN)throw"cancel";if(PAUSED){await sleep(60);continue;}const t=Math.min(40,rem);await sleep(t);rem-=t;}if(run!==RUN)throw"cancel";}
function K(t){try{return katex.renderToString(t,{displayMode:false,throwOnError:false});}catch(e){return t;}}
function setEq(t){$("bar").classList.remove("idle");$("eq").innerHTML=K(t);}
function setEqIdle(t){$("bar").classList.add("idle");$("eq").textContent=t;}
function heat(t){const s=[[22,32,90],[31,122,140],[245,165,36]];const g=t<.5?0:1,lt=t<.5?t/.5:(t-.5)/.5,a=s[g],b=s[g+1];const c=[0,1,2].map(i=>Math.round(a[i]+(b[i]-a[i])*lt));return`rgb(${c[0]},${c[1]},${c[2]})`;}
function rng(){return Math.random();}
function sample(probs){const r=rng();let c=0;for(let i=0;i<probs.length;i++){c+=probs[i];if(r<c)return i;}return probs.length-1;}
const getCSS=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim()||"#F5A524";

/* ---- heatmap ---- */
const cid=(i,j)=>`hc_${i}_${j}`;
function heatmapHTML(){
  let h=`<div class="mxlabel">bigram counts <span class="axislabel">N[current, next]</span></div><table class="mx"><tr><th></th>`;
  for(let j=0;j<V;j++)h+=`<th>${labelOf(j)}</th>`;h+=`</tr>`;
  for(let i=0;i<V;i++){h+=`<tr><th class="rh">${labelOf(i)}</th>`;
    for(let j=0;j<V;j++){const t=Math.log(N[i][j]+1)/MAXLOG;h+=`<td class="cell" id="${cid(i,j)}" style="background:${heat(t)};color:${t>0.55?'#241a04':'#9fb0d0'}" title="${labelOf(i)}→${labelOf(j)} : ${N[i][j]}"></td>`;}
    h+=`</tr>`;}
  return h+`</table>`;
}
const cell=(i,j)=>$(cid(i,j));
function clearLit(){document.querySelectorAll("td.cell.rowlit,td.cell.collit,td.cell.hot").forEach(c=>c.classList.remove("rowlit","collit","hot"));}
function litRow(i){for(let j=0;j<V;j++)cell(i,j)?.classList.add("rowlit");}
function ping(i,j){const c=cell(i,j);if(!c)return;c.classList.remove("ping");void c.offsetWidth;c.classList.add("ping");}

/* ---- distribution bar chart ---- */
function distHTML(i){
  const order=P[i].map((p,j)=>[j,p]).sort((a,b)=>b[1]-a[1]);
  const top=order[0][0];
  let h=`<div class="dist" id="dist"><div class="mxlabel">P(next | <span style="color:var(--signal)">${labelOf(i)}</span>)</div>`;
  for(let j=0;j<V;j++){const p=P[i][j];
    h+=`<div class="drow ${j===top?'top':''}" id="dr_${j}"><span class="dch">${labelOf(j)}</span><div class="dtrack"><div class="dfill" id="df_${j}" style="width:0"></div></div><span class="dpct" id="dp_${j}">·</span></div>`;}
  return h+`</div>`;
}
function fillDist(i,animate){
  for(let j=0;j<V;j++){const f=$(`df_${j}`),pc=$(`dp_${j}`);if(!f)continue;
    const p=P[i][j];f.style.width=(p*100).toFixed(2)+"%";if(pc)pc.textContent=(p*100).toFixed(1)+"%";}
}

/* ---- name display ---- */
function nameHTML(){
  return `<div class="namewrap"><div class="mxlabel">generated name</div><div class="namebox" id="namebox"><span class="dot">.</span><span class="cursor"></span></div>
    <div class="mxlabel" style="margin-top:8px">previous samples</div><div class="genlist" id="genlist"></div></div>`;
}
function renderName(chars,cur){
  const box=$("namebox");if(!box)return;
  let h=`<span class="dot">.</span>`;
  chars.forEach(c=>h+=`<span>${c}</span>`);
  if(cur!=null)h+=`<span class="cur">${cur==='.'?'•':cur}</span>`;
  h+=`<span class="cursor"></span>`;box.innerHTML=h;
}
function flow(fromEl,toEl,color){
  if(REDUCED||!fromEl||!toEl)return;const layer=$("stage").querySelector(".flowlayer");if(!layer)return;
  const sr=$("stage").getBoundingClientRect(),ar=fromEl.getBoundingClientRect(),br=toEl.getBoundingClientRect();
  const x0=ar.left+ar.width/2-sr.left,y0=ar.top+ar.height/2-sr.top,x1=br.left+br.width/2-sr.left,y1=br.top+br.height/2-sr.top;
  const d=document.createElement("div");d.className="dotfx";d.style.left=x0+"px";d.style.top=y0+"px";if(color){d.style.background=color;d.style.boxShadow="0 0 9px "+color;}
  layer.appendChild(d);requestAnimationFrame(()=>{d.style.transform=`translate(-50%,-50%) translate(${(x1-x0).toFixed(1)}px,${(y1-y0).toFixed(1)}px) scale(.5)`;d.style.opacity="0";});
  setTimeout(()=>d.remove(),460);
}
function scaffold(html){$("stage").innerHTML=html+`<div class="flowlayer"></div>`;}

/* ============================================================ stage driver ============================================================ */
async function animateStage(id,run){
  const S=STAGES[id];
  $("stageno").textContent="Stage "+String(id).padStart(2,"0")+" · vocab 27";
  $("stagetitle").textContent=S.title;$("stagedesc").textContent=S.desc;
  $("hint").innerHTML=id===0?"Hover any cell to read its exact count.":id===1?"Click a different <b>current character</b> in the sidebar to see its distribution.":"";
  renderNav();

  if(id===0){
    scaffold(heatmapHTML());
    setEqIdle("each cell N[i,j] = how many times character j follows character i");
    // sweep reveal row by row
    for(let i=0;i<V;i++){litRow(i);setEq(`\\text{row }${labelOf(i)===''?'\\cdot':labelOf(i)}\\text{: how often each letter follows }${labelOf(i)==='.'?'\\text{start/end}':`\\text{“}${labelOf(i)}\\text{”}`}`);await step(70,run);clearLit();}
    setEqIdle("27 × 27 = 729 transition counts from 228,146 character pairs");
    $("stage").insertAdjacentHTML("beforeend",`<div class="legend"><span>rare</span><span class="legbar"></span><span>common</span></div><div class="caption">Row 0 is the <b>'.'</b> token: as a <b>row</b> it says which letters <b>start</b> names; as a <b>column</b> it says which letters <b>end</b> them. Notice bright spots like <span class="s">a→n</span>, <span class="s">.→a/k/m</span>.</div>`);
  }

  else if(id===1){
    scaffold(`<div class="row">${heatmapHTML()}${distHTML(state.cur)}</div>`);
    litRow(state.cur);
    setEq(`P(\\text{next}\\mid ${labelOf(state.cur)==='.'?'\\cdot':labelOf(state.cur)}) = \\dfrac{N[${labelOf(state.cur)==='.'?'\\cdot':labelOf(state.cur)},\\,\\text{next}]}{\\sum_k N[${labelOf(state.cur)==='.'?'\\cdot':labelOf(state.cur)},\\,k]}`);
    await step(300,run);
    // animate bars filling, in descending order
    const order=P[state.cur].map((p,j)=>[j,p]).sort((a,b)=>b[1]-a[1]);
    for(const [j,p] of order){if(p<0.0005)continue;ping(state.cur,j);const f=$(`df_${j}`),pc=$(`dp_${j}`);if(f){f.style.width=(p*100).toFixed(2)+"%";}if(pc)pc.textContent=(p*100).toFixed(1)+"%";
      setEq(`P(${labelOf(j)===''?'\\cdot':labelOf(j)==='.'?'\\cdot':labelOf(j)}\\mid ${labelOf(state.cur)==='.'?'\\cdot':labelOf(state.cur)}) = \\dfrac{${N[state.cur][j]}+1}{${TOT_ROW(state.cur)}} = ${fx(p,3)}`);
      await step(60,run);}
    setEq(`\\sum_{\\text{next}} P(\\text{next}\\mid ${labelOf(state.cur)==='.'?'\\cdot':labelOf(state.cur)}) = 1`);
    $("stage").insertAdjacentHTML("beforeend",`<div class="caption">The <b>+1</b> in the numerator is <b>smoothing</b> — it keeps every transition slightly possible so nothing has probability 0 (and the loss never hits ∞).</div>`);
  }

  else if(id===2){
    scaffold(`<div class="row">${heatmapHTML()}${nameHTML()}</div>`);
    setEqIdle("start at '.', then sample → hop → repeat");
    await step(200,run);
    state.gen=[];
    let cur=0;const out=[];
    renderName(out,null);
    let guard=0;
    while(guard++<40){
      clearLit();litRow(cur);
      setEq(`\\text{current} = ${labelOf(cur)==='.'?'\\cdot':labelOf(cur)}\\ \\Rightarrow\\ \\text{sample from } P(\\text{next}\\mid ${labelOf(cur)==='.'?'\\cdot':labelOf(cur)})`);
      await step(280,run);
      const ix=sample(P[cur]);
      ping(cur,ix);
      const fromEl=cell(cur,ix),toEl=$("namebox");flow(fromEl,toEl,getCSS("--signal"));
      setEq(`\\text{sampled }${labelOf(ix)==='.'?'\\cdot\\ (\\text{end})':`\\text{“}${labelOf(ix)}\\text{”}`}\\quad p=${fx(P[cur][ix],3)}`);
      if(ix===0){renderName(out,'.');await step(360,run);break;}
      out.push(labelOf(ix));renderName(out,null);
      await step(180,run);
      cur=ix;
    }
    clearLit();
    const name=out.join("");
    state.gen.push(name);
    $("genlist").innerHTML=state.gen.map(n=>`<span class="genname">${n}</span>`).join("");
    setEq(`\\hat{\\text{name}} = \\text{“${name}”}`);
    $("stage").insertAdjacentHTML("beforeend",`<div class="endcap">▸ press ▶ again for another name — each is a fresh random walk through the table</div>`);
  }

  else if(id===3){
    scaffold(`<div class="row" style="flex-direction:column"><div>
      <div class="mxlabel">the loss — average negative log-likelihood over all 228,146 bigrams</div>
      <div class="lossnum">L = ${fx(AVG_NLL,4)} nats</div></div></div>`);
    setEq(`L = -\\frac{1}{n}\\sum_{(i,j)} \\log P(j\\mid i) = ${fx(AVG_NLL,4)}`);
    await step(500,run);
    setEq(`\\text{a uniform guesser would score } \\log 27 = ${fx(Math.log(27),4)}\\ \\text{— lower is better}`);
    $("stage").insertAdjacentHTML("beforeend",
      `<div class="caption" style="max-width:74ch"><b>The neural twin.</b> One-hot a character into a length-27 vector, multiply by a 27×27 weight matrix <b>W</b> to get <span class="s">logits</span>, then <span class="s">softmax</span>. If we read the logits as log-counts, softmax is exactly the row-normalization above — so this 1-layer net <b>is</b> the bigram model. Trained by gradient descent it reaches the very same loss ≈ ${fx(AVG_NLL,2)}.</div>
      <div class="caption">$\\text{logits}=x_{\\text{1-hot}}\\,W,\\quad p_j=\\frac{e^{\\text{logit}_j}}{\\sum_k e^{\\text{logit}_k}},\\quad \\text{counts}=e^{\\text{logits}}\\approx N$</div>`);
    renderMath();
  }
}
function TOT_ROW(i){return N[i].reduce((a,b)=>a+b+1,0);}
function renderMath(){document.querySelectorAll(".caption").forEach(el=>{el.innerHTML=el.innerHTML.replace(/\$([^$]+)\$/g,(m,t)=>K(t));});}

/* ============================================================ orchestration ============================================================ */
function renderNav(){
  $("nav").innerHTML=STAGES.map(s=>`<button class="navitem ${s.id===state.stage?"on":(s.id<state.stage?"done":"")}" data-stage="${s.id}"><span class="ix">${String(s.id).padStart(2,"0")}</span><span class="nm">${s.name}</span></button>`).join("");
  $("nav").querySelectorAll(".navitem").forEach(b=>b.onclick=()=>jumpStage(+b.dataset.stage));
  $("prev").disabled=state.stage===0;$("next").disabled=state.stage===STAGES.length-1;
}
function renderChips(){
  $("chips").innerHTML=Array.from({length:V},(_,i)=>`<span class="chip ${i===state.cur?'lit':''}" data-c="${i}">${labelOf(i)}</span>`).join("");
  $("chips").querySelectorAll(".chip").forEach(c=>c.onclick=()=>{state.cur=+c.dataset.c;renderChips();if(state.stage===1)jumpStage(1);else{state.stage=1;jumpStage(1);}});
  $("params").innerHTML=`<span>current=<b>${labelOf(state.cur)}</b></span><span>loss=<b>${fx(AVG_NLL,3)}</b></span>`;
}
function setPlayLabel(){$("play").innerHTML=RUNNING&&!PAUSED?"❚❚ Pause":"▶ Play";}
async function runSingle(id){RUN++;const run=RUN;RUNNING=true;PAUSED=false;SKIP=false;state.stage=id;setPlayLabel();
  try{await animateStage(id,run);}catch(e){if(e!=="cancel")console.error(e);if(run===RUN){RUNNING=false;setPlayLabel();}return;}
  if(run===RUN){RUNNING=false;setPlayLabel();}}
function skipStage(){RUN++;const run=RUN;SKIP=true;RUNNING=false;PAUSED=false;setPlayLabel();animateStage(state.stage,run).catch(()=>{}).then(()=>{if(run===RUN)SKIP=false;});}
async function playAll(){RUN++;const run=RUN;RUNNING=true;PAUSED=false;SKIP=false;setPlayLabel();
  try{for(let s=state.stage;s<STAGES.length;s++){state.stage=s;renderNav();syncHash();await animateStage(s,run);if(run!==RUN)return;if(s<STAGES.length-1)await step(520,run);}}catch(e){return;}
  if(run===RUN){RUNNING=false;PAUSED=false;setPlayLabel();}}
function onPlay(){if(RUNNING){PAUSED=!PAUSED;setPlayLabel();return;}if(state.stage===2){runSingle(2);return;}if(state.stage===STAGES.length-1)state.stage=0;playAll();}
function jumpStage(id){RUN++;state.stage=id;renderNav();renderChips();syncHash();runSingle(id);}
function gotoPrev(){if(state.stage>0)jumpStage(state.stage-1);}
function gotoNext(){if(state.stage<STAGES.length-1)jumpStage(state.stage+1);}
function syncHash(){try{history.replaceState(null,"",`#st=${state.stage}&c=${state.cur}`);}catch(e){}}
function readHash(){try{const r=location.hash.replace(/^#/,"");if(!r)return null;const p={};r.split("&").forEach(kv=>{const i=kv.indexOf("=");if(i>0)p[kv.slice(0,i)]=kv.slice(i+1);});return p;}catch(e){return null;}}

/* ---- export ---- */
let recording=false,_gw=null;const BG=()=>getComputedStyle(document.body).backgroundColor||"#0A0D13";const APP=()=>document.querySelector(".app");
function expStat(m,e){const x=$("expstat");if(!x)return;if(!m){x.style.display="none";return;}x.style.display="";x.classList.toggle("err",!!e);x.textContent=m;}
function dl(b,n){const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=n;a.click();setTimeout(()=>URL.revokeObjectURL(u),5000);}
function drawContain(c,img,W,H){const s=Math.min(W/img.width,H/img.height),w=img.width*s,h=img.height*s;c.drawImage(img,(W-w)/2,(H-h)/2,w,h);}
function resetExp(){["expgif","exppng"].forEach(id=>{const b=$(id);if(b){b.disabled=false;b.classList.remove("rec");}});}
async function gwURL(){if(_gw)return _gw;const r=await fetch("https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js");_gw=URL.createObjectURL(new Blob([await r.text()],{type:"application/javascript"}));return _gw;}
async function snapPNG(){if(!window.htmlToImage){expStat("capture lib not loaded",true);return;}expStat("rendering PNG…");try{const d=await htmlToImage.toPng(APP(),{pixelRatio:1.5,backgroundColor:BG()});dl(await(await fetch(d)).blob(),`bigram-${Date.now()}.png`);expStat("PNG downloaded.");}catch(e){expStat("failed: "+(e.message||e),true);}}
async function recordGIF(){if(recording)return;if(!window.GIF||!window.htmlToImage){expStat("export lib not loaded",true);return;}
  recording=true;PAUSED=false;SKIP=false;$("expgif").disabled=$("exppng").disabled=true;$("expgif").classList.add("rec");expStat("preparing…");
  let wu;try{wu=await gwURL();}catch(e){expStat("worker load failed",true);recording=false;resetExp();return;}
  const node=APP(),rect=node.getBoundingClientRect(),W=Math.min(1000,Math.round(rect.width)),scale=W/rect.width,H=Math.min(1300,Math.round(rect.height*scale));
  const fr=document.createElement("canvas");fr.width=W;fr.height=H;const fc=fr.getContext("2d");
  const gif=new GIF({workers:2,quality:12,width:W,height:H,workerScript:wu,background:"#0A0D13"});
  let cap=true,frames=0,last=performance.now();
  const loop=(async()=>{while(cap){try{const snap=await htmlToImage.toCanvas(node,{pixelRatio:scale,backgroundColor:BG()});fc.fillStyle=BG();fc.fillRect(0,0,W,H);drawContain(fc,snap,W,H);const now=performance.now(),delay=Math.max(60,Math.min(400,Math.round(now-last)));last=now;gif.addFrame(fc,{copy:true,delay});frames++;if(frames%4===0)expStat(`capturing… ${frames}`);}catch(e){}await sleep(110);}})();
  RUN++;const r=RUN;expStat("recording…");try{await animateStage(state.stage,r);}catch(e){}await sleep(450);cap=false;await loop;
  if(!frames){expStat("no frames (try Chrome)",true);recording=false;resetExp();return;}
  expStat(`encoding… ${frames} frames`);gif.on("progress",p=>expStat(`encoding… ${Math.round(p*100)}%`));
  gif.on("finished",b=>{recording=false;resetExp();expStat(`done — ${(b.size/1048576).toFixed(1)} MB`);dl(b,`bigram-${Date.now()}.gif`);});gif.render();}

/* ---- wiring ---- */
$("play").onclick=onPlay;$("prev").onclick=gotoPrev;$("next").onclick=gotoNext;$("skip").onclick=skipStage;$("replay").onclick=()=>jumpStage(state.stage);
$("speed").querySelectorAll("button").forEach(b=>b.onclick=()=>{SPEED=+b.dataset.s;$("speed").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));});
$("expgif").onclick=recordGIF;$("exppng").onclick=snapPNG;
$("copylink").onclick=()=>{const b=$("copylink");const done=()=>{b.classList.add("copied");b.textContent="✓ Link copied";setTimeout(()=>{b.classList.remove("copied");b.textContent="🔗 Copy link";},1600);};try{navigator.clipboard.writeText(location.href).then(done,done);}catch(e){done();}};
document.addEventListener("keydown",e=>{if(e.target.tagName==="INPUT")return;if(e.key==="ArrowLeft")gotoPrev();if(e.key==="ArrowRight")gotoNext();if(e.key===" "){e.preventDefault();onPlay();}if(e.key==="Enter")skipStage();});

function boot(){if(!window.katex){setTimeout(boot,60);return;}
  const p=readHash();if(p){if(p.c!=null)state.cur=Math.max(0,Math.min(26,+p.c||0));}
  renderChips();renderNav();setPlayLabel();
  const st=p&&p.st!=null?+p.st:0;state.stage=(st>=0&&st<STAGES.length)?st:0;runSingle(state.stage);}
boot();
</script>
</body>
