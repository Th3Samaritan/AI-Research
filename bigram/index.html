const ITOS = DATA.itos, N = DATA.N, V = 27;
const STOI = {}; ITOS.forEach((c,i)=>STOI[c]=i);
const labelOf = i => ITOS[i];

/* raw (unsmoothed) row distribution */
const rowSum = i => N[i].reduce((a,b)=>a+b,0);
const rawRow = i => { const s=rowSum(i)||1; return N[i].map(c=>c/s); };
/* smoothed model (+1) used for generation */
const P = N.map(row => { const s = row.reduce((a,b)=>a+b+1,0); return row.map(c=>(c+1)/s); });
/* key real numbers */
const NAMES = rowSum(0);                       // 32033 (one start->first per name)
const TOTAL = N.flat().reduce((a,b)=>a+b,0);   // 228146
const A=STOI['a'];
const A_FIRST = N[0][A];                        // .a  -> a is first   (4410)
const A_LAST  = N[A][0];                        // a.  -> a is last    (6640)
const P_FIRST_A = A_FIRST/NAMES;                // 0.1377
/* loss + perplexity from counts (smoothed) */
let NLL=0; for(let i=0;i<V;i++)for(let j=0;j<V;j++) NLL += N[i][j]*-Math.log(P[i][j]);
const AVG_NLL = NLL/TOTAL, PPL = Math.exp(AVG_NLL), UNI=Math.log(V), UNI_PPL=V;
const MAXLOG = Math.log(Math.max(...N.flat())+1);
/* a real zero-count bigram, for the smoothing step */
let ZERO=[0,0]; outer: for(let i=1;i<V;i++)for(let j=1;j<V;j++){ if(N[i][j]===0){ZERO=[i,j];break outer;} }

const STAGES=[
  {id:0,name:"The data",title:"32,033 names, and a boundary token",
   desc:"Everything starts from the dataset. The alphabet is the 26 letters plus one special token '.', which marks BOTH the start and the end of a name — 27 symbols in total. Before counting, every name is wrapped: emma becomes . e m m a ."},
  {id:1,name:"Count the pairs",title:"Tally every adjacent pair into a 27×27 table",
   desc:"A 'bigram' is two adjacent characters. We slide across each wrapped name and add 1 to N[current, next]. Rows are the current character, columns the next. Across all names that records 228,146 pairs — brighter cells are more frequent."},
  {id:2,name:"First letters",title:"Reading row 0 — and the .a vs a. trap",
   desc:"Row 0 (the '.' token) records start→first-letter, so it IS the distribution of first letters. Watch out: .a (start→a) means a is FIRST; a. (a→end) means a is LAST. They are different cells with different counts."},
  {id:3,name:"Row → probability",title:"Normalize a row into P(next | current)",
   desc:"Divide each count in a row by that row's total so the 27 numbers sum to 1. That gives the conditional distribution P(next | current) — the maximum-likelihood estimate. Pick any current character in the sidebar to inspect its row."},
  {id:4,name:"Sample one",title:"One draw from the distribution (a weighted die)",
   desc:"To pick the next character we sample from the row's distribution: lay the probabilities end to end on [0,1], roll a random number, and see which slice it lands in. Higher-probability characters own bigger slices."},
  {id:5,name:"Generate a name",title:"Sample, hop, repeat until '.'",
   desc:"Start at '.', sample the next character, append it, move to that character's row, and repeat until '.' is drawn. A generated name is just a random walk through the table, starting and ending at the boundary token."},
  {id:6,name:"The loss",title:"Score the whole model in one number (NLL)",
   desc:"The loss is the average negative log-likelihood: take the probability the model gave each true next character, log it, negate, and average. Lower is better; a perfect model scores 0, a uniform guesser scores log(27) ≈ 3.30."},
  {id:7,name:"Perplexity",title:"How many choices is it confused among?",
   desc:"Perplexity = e^loss reads the loss as an 'effective number of choices'. A uniform model over 27 symbols has perplexity 27; our bigram model is far lower — it has genuinely learned structure."},
  {id:8,name:"Smoothing",title:"Why we add +1 to every count",
   desc:"If a pair never occurs its count is 0, its probability is 0, and log(0) = −∞ would make the loss infinite. Add-one (Laplace) smoothing adds 1 to every count before normalizing, so every transition stays just barely possible."},
  {id:9,name:"The neural twin",title:"The same model as a 1-layer neural net",
   desc:"One-hot a character (a length-27 vector, a single 1), multiply by a 27×27 matrix W to get logits, then softmax. Because the input is one-hot, x·W just SELECTS row i of W — so this network is the bigram model, reachable by gradient descent instead of counting."},
];

/* ---- control ---- */
let RUN=0,PAUSED=false,SPEED=1,RUNNING=false,SKIP=false;
let state={stage:0,cur:0,gen:[]};

const fx=(x,p=2)=>{const v=(+x).toFixed(p);return v==="-0.00"?"0.00":v;};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function step(ms,run){if(SKIP){if(run!==RUN)throw"cancel";return;}let rem=ms/SPEED;while(rem>0){if(run!==RUN)throw"cancel";if(PAUSED){await sleep(60);continue;}const t=Math.min(40,rem);await sleep(t);rem-=t;}if(run!==RUN)throw"cancel";}
function K(t){try{return katex.renderToString(t,{displayMode:false,throwOnError:false});}catch(e){return t;}}
function setEq(t){$("bar").classList.remove("idle");$("eq").innerHTML=K(t);}
function setEqIdle(t){$("bar").classList.add("idle");$("eq").textContent=t;}
function heat(t){const s=[[22,32,90],[31,122,140],[245,165,36]];const g=t<.5?0:1,lt=t<.5?t/.5:(t-.5)/.5,a=s[g],b=s[g+1];const c=[0,1,2].map(i=>Math.round(a[i]+(b[i]-a[i])*lt));return`rgb(${c[0]},${c[1]},${c[2]})`;}
function sample(probs){const r=Math.random();let c=0;for(let i=0;i<probs.length;i++){c+=probs[i];if(r<c)return i;}return probs.length-1;}
const getCSS=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim()||"#F5A524";
const tex=i=>labelOf(i)==='.'?'\\cdot':`\\text{${labelOf(i)}}`;
function renderNotes(){document.querySelectorAll(".note,.caption").forEach(el=>{el.innerHTML=el.innerHTML.replace(/\$([^$]+)\$/g,(m,t)=>K(t));});}

/* ---- heatmap ---- */
const cid=(i,j)=>`hc_${i}_${j}`;
function heatmapHTML(showText){
  let h=`<div class="col"><div class="mxlabel">bigram counts <span class="axislabel">N[current → next]</span></div><table class="mx"><tr><th></th>`;
  for(let j=0;j<V;j++)h+=`<th>${labelOf(j)}</th>`;h+=`</tr>`;
  for(let i=0;i<V;i++){h+=`<tr><th class="rh">${labelOf(i)}</th>`;
    for(let j=0;j<V;j++){const t=Math.log(N[i][j]+1)/MAXLOG;h+=`<td class="cell" id="${cid(i,j)}" style="background:${heat(t)};color:${t>0.55?'#241a04':'#9fb0d0'}" title="${labelOf(i)}→${labelOf(j)} : ${N[i][j]}">${showText?N[i][j]:''}</td>`;}
    h+=`</tr>`;}
  return h+`</table></div>`;
}
const cell=(i,j)=>$(cid(i,j));
function clearLit(){document.querySelectorAll("td.cell.rowlit,td.cell.collit,td.cell.hot,td.cell.zero").forEach(c=>c.classList.remove("rowlit","collit","hot","zero"));}
function litRow(i){for(let j=0;j<V;j++)cell(i,j)?.classList.add("rowlit");}
function litCol(j){for(let i=0;i<V;i++)cell(i,j)?.classList.add("collit");}
function ping(i,j){const c=cell(i,j);if(!c)return;c.classList.remove("ping");void c.offsetWidth;c.classList.add("ping");}

/* ---- distribution bars ---- */
function distHTML(i,probs,label){
  const order=probs.map((p,j)=>[j,p]).sort((a,b)=>b[1]-a[1]);const top=order[0][0];
  let h=`<div class="col"><div class="dist" id="dist"><div class="mxlabel">${label}</div>`;
  for(let j=0;j<V;j++)h+=`<div class="drow ${j===top?'top':''}" id="dr_${j}"><span class="dch">${labelOf(j)}</span><div class="dtrack"><div class="dfill" id="df_${j}" style="width:0"></div></div><span class="dpct" id="dp_${j}">·</span></div>`;
  return h+`</div></div>`;
}
async function fillDistAnim(i,probs,run,eqfn){
  const order=probs.map((p,j)=>[j,p]).sort((a,b)=>b[1]-a[1]);
  for(const [j,p] of order){if(p<0.0004)continue;ping(i,j);const f=$(`df_${j}`),pc=$(`dp_${j}`);if(f)f.style.width=(p*100).toFixed(2)+"%";if(pc)pc.textContent=(p*100).toFixed(1)+"%";if(eqfn)setEq(eqfn(j,p));await step(55,run);}
}
function fillDist(probs){for(let j=0;j<V;j++){const f=$(`df_${j}`),pc=$(`dp_${j}`);if(f)f.style.width=(probs[j]*100).toFixed(2)+"%";if(pc)pc.textContent=(probs[j]*100).toFixed(1)+"%";}}

/* ---- name display ---- */
function nameHTML(){return `<div class="col"><div class="mxlabel">generated name</div><div class="namebox" id="namebox"><span class="dot">.</span><span class="cursor"></span></div>
  <div class="mxlabel" style="margin-top:8px">previous samples</div><div class="nlist" id="genlist">${state.gen.map(n=>`<span class="genname">${n}</span>`).join("")}</div></div>`;}
function renderName(chars,cur){const box=$("namebox");if(!box)return;let h=`<span class="dot">.</span>`;chars.forEach(c=>h+=`<span>${c}</span>`);if(cur!=null)h+=`<span class="cur">${cur==='.'?'•':cur}</span>`;h+=`<span class="cursor"></span>`;box.innerHTML=h;}
function flow(fromEl,toEl,color){if(REDUCED||!fromEl||!toEl)return;const layer=$("stage").querySelector(".flowlayer");if(!layer)return;
  const sr=$("stage").getBoundingClientRect(),ar=fromEl.getBoundingClientRect(),br=toEl.getBoundingClientRect();
  const x0=ar.left+ar.width/2-sr.left,y0=ar.top+ar.height/2-sr.top,x1=br.left+br.width/2-sr.left,y1=br.top+br.height/2-sr.top;
  const d=document.createElement("div");d.className="dotfx";d.style.left=x0+"px";d.style.top=y0+"px";if(color){d.style.background=color;d.style.boxShadow="0 0 9px "+color;}
  layer.appendChild(d);requestAnimationFrame(()=>{d.style.transform=`translate(-50%,-50%) translate(${(x1-x0).toFixed(1)}px,${(y1-y0).toFixed(1)}px) scale(.5)`;d.style.opacity="0";});setTimeout(()=>d.remove(),460);}
function scaffold(html){$("stage").innerHTML=html+`<div class="flowlayer"></div>`;}
function addNote(html,cls){const d=document.createElement("div");d.className="note"+(cls?" "+cls:"");d.innerHTML=html;$("stage").appendChild(d);renderNotes();}
function addCaption(html){const d=document.createElement("div");d.className="caption";d.innerHTML=html;$("stage").appendChild(d);renderNotes();}

/* ============================================================ stage driver ============================================================ */
async function animateStage(id,run){
  const S=STAGES[id];
  $("stageno").textContent="Step "+String(id).padStart(2,"0")+" / "+(STAGES.length-1);
  $("stagetitle").textContent=S.title;$("stagedesc").textContent=S.desc;
  $("hint").innerHTML = id===0?"":id===3?"Click any <b>current character</b> in the sidebar to inspect its row.":(id===1||id===2)?"Hover any cell to read its exact count.":"";
  renderNav();

  /* ---------- 0 · the data ---------- */
  if(id===0){
    const demo=["emma","olivia","ava","isabella","sophia"];
    scaffold(`<div class="col" style="gap:16px">
      <div class="col"><div class="mxlabel">a few of the 32,033 names</div><div class="nlist">${demo.map(n=>`<span class="nameitem">${n}</span>`).join("")}</div></div>
      <div class="col"><div class="mxlabel">the vocabulary — 26 letters + the boundary token '.', index 0 → <b style="color:var(--signal)">27 symbols</b></div><div class="vocab" id="vocab"></div></div>
      <div class="col"><div class="mxlabel">every name is wrapped with '.' (start and end), then read as adjacent pairs</div><div class="wrapseq" id="wrapseq"></div><div class="pairlist" id="pairs"></div></div>
    </div>`);
    $("vocab").innerHTML=ITOS.map((c,i)=>`<span class="vchip ${c==='.'?'dot':''}" title="index ${i}">${c}</span>`).join("");
    setEqIdle("a name becomes a sequence of characters between two boundary tokens");
    await step(300,run);
    const seq=['.','e','m','m','a','.'];
    const ws=$("wrapseq");
    for(let k=0;k<seq.length;k++){
      const t=document.createElement("div");t.className="tok"+(seq[k]==='.'?' dot':'');t.textContent=seq[k]==='.'?'.':seq[k];ws.appendChild(t);
      setEq(`\\text{wrap: }\\ \\texttt{.\\,e\\,m\\,m\\,a\\,.}`);
      await step(160,run);
      if(k<seq.length-1){const a=document.createElement("span");a.className="arr";a.textContent="→";ws.appendChild(a);}
    }
    await step(250,run);
    const pl=$("pairs");const pairs=[];for(let k=0;k<seq.length-1;k++)pairs.push(seq[k]+seq[k+1]);
    for(const pr of pairs){const e=document.createElement("span");e.className="pair lit";e.textContent=pr.replace(/\./g,'.');pl.appendChild(e);
      setEq(`\\text{bigram } \\texttt{${pr.replace('.','\\,.\\,').trim()}}`);await step(220,run);e.classList.remove("lit");}
    addNote(`The token <b>.</b> does double duty: as the <span class="c">first</span> symbol it teaches the model which letters <b>start</b> names, and as the <span class="c">last</span> symbol which letters <b>end</b> them. <code>emma</code> yields the 5 pairs <b>.e&nbsp; em&nbsp; mm&nbsp; ma&nbsp; a.</b>`);
  }

  /* ---------- 1 · count ---------- */
  else if(id===1){
    scaffold(heatmapHTML(false));
    setEqIdle("N[i,j] = number of times character j follows character i");
    for(let i=0;i<V;i++){litRow(i);setEq(`\\text{row }${tex(i)}\\text{: how often each letter follows }${i===0?'\\text{“start”}':tex(i)}`);await step(64,run);clearLit();}
    setEq(`\\textstyle\\sum_{i,j} N[i,j] = ${TOTAL.toLocaleString()}\\ \\text{bigrams counted}`);
    addNote(`For <code>emma</code> we added 1 to five cells: <b>N[.,e]</b>, <b>N[e,m]</b>, <b>N[m,m]</b>, <b>N[m,a]</b>, <b>N[a,.]</b>. Do that for all 32,033 names and the table holds <b>${TOTAL.toLocaleString()}</b> counts in total.`);
    addCaption(`<span class="s">Bright</span> = common transition. Row <b>.</b> (top) shows common first letters; column <b>.</b> (left) shows common last letters.`);
  }

  /* ---------- 2 · first letters / the trap ---------- */
  else if(id===2){
    scaffold(`<div class="row">${heatmapHTML(false)}${distHTML(0,rawRow(0),'P(first letter) = row 0, normalized')}</div>`);
    litRow(0);
    setEq(`\\text{row 0 is the }\\cdot\\text{ token} \\Rightarrow \\text{the distribution over first letters}`);
    await step(350,run);
    await fillDistAnim(0,rawRow(0),run,(j,p)=>`P(\\text{first}=${tex(j)}) = \\dfrac{N[0,${tex(j)}]}{${NAMES.toLocaleString()}} = ${fx(p,3)}`);
    // highlight the two confusable cells
    clearLit();
    cell(0,A)?.classList.add("hot"); ping(0,A);
    setEq(`\\texttt{.a} = N[0,\\text{a}] = ${A_FIRST.toLocaleString()}\\quad(\\text{a is the \\emph{first} letter})`);
    await step(900,run);
    cell(A,0)?.classList.add("collit"); ping(A,0);
    setEq(`\\texttt{a.} = N[\\text{a},0] = ${A_LAST.toLocaleString()}\\quad(\\text{a is the \\emph{last} letter})`);
    await step(900,run);
    addNote(`<b>The trap:</b> <code>.a</code> and <code>a.</code> are different cells.<br>• <code>.a</code> = <b>N[0,a] = ${A_FIRST.toLocaleString()}</b> → names that <b>start</b> with a.<br>• <code>a.</code> = <b>N[a,0] = ${A_LAST.toLocaleString()}</b> → names that <b>end</b> with a.<br>So $P(\\text{first}=\\text{a}) = \\frac{${A_FIRST}}{${NAMES}} = ${fx(P_FIRST_A,4)}$ — divide by the <span class="c">row-0 sum</span> (= number of names = <b>${NAMES.toLocaleString()}</b>), <span class="r">not</span> by the ${TOTAL.toLocaleString()} total bigrams.`);
    addCaption(`Each row has its <b>own</b> denominator (its own row sum). Row 0 sums to ${NAMES.toLocaleString()} because there is exactly one start→first-letter transition per name.`);
  }

  /* ---------- 3 · row -> probability ---------- */
  else if(id===3){
    const pr=rawRow(state.cur);
    scaffold(`<div class="row">${heatmapHTML(false)}${distHTML(state.cur,pr,`P(next | ${labelOf(state.cur)})`)}</div>`);
    litRow(state.cur);
    setEq(`P(j \\mid ${tex(state.cur)}) = \\dfrac{N[${tex(state.cur)},\\,j]}{\\sum_k N[${tex(state.cur)},\\,k]}`);
    await step(300,run);
    await fillDistAnim(state.cur,pr,run,(j,p)=>`P(${tex(j)}\\mid ${tex(state.cur)}) = \\dfrac{${N[state.cur][j]}}{${rowSum(state.cur).toLocaleString()}} = ${fx(p,3)}`);
    setEq(`\\textstyle\\sum_j P(j\\mid ${tex(state.cur)}) = 1\\quad\\text{(a valid distribution)}`);
    addNote(`These empirical frequencies are the <b>maximum-likelihood estimate</b>: the probabilities that make the observed names as likely as possible are simply the proportions we counted.`);
    addNote(`<b>Shapes matter.</b> Normalizing every row at once is <code>P /= P.sum(1, keepdims=True)</code>. The sum has shape <b>(27,1)</b> so it broadcasts across columns — normalizing each <span class="c">row</span>. Drop <code>keepdims</code> and you get shape <b>(27,)</b>, which normalizes the wrong axis: a silent, model-destroying bug.`,'cool');
  }

  /* ---------- 4 · sample one ---------- */
  else if(id===4){
    const pr=P[state.cur];
    scaffold(`<div class="row">${distHTML(state.cur,pr,`P(next | ${labelOf(state.cur)}) — slices of a weighted die`)}</div>`);
    fillDist(pr);
    setEq(`\\text{lay probabilities on } [0,1],\\ \\text{roll } r\\sim U(0,1),\\ \\text{take the slice it lands in}`);
    await step(400,run);
    // do 3 demonstration draws
    for(let d=0;d<3;d++){
      const r=Math.random();let c=0,ix=0;for(let j=0;j<V;j++){c+=pr[j];if(r<c){ix=j;break;}}
      document.querySelectorAll(".drow").forEach(x=>x.classList.remove("top"));
      $(`dr_${ix}`)?.classList.add("top");
      setEq(`\\text{roll } r=${fx(r,3)}\\ \\Rightarrow\\ \\text{lands in slice } ${tex(ix)}\\ (p=${fx(pr[ix],3)})`);
      await step(900,run);
    }
    addNote(`This is <code>torch.multinomial(p, 1)</code> — a weighted dice roll. A character with probability 0.15 owns 15% of the line, so it is picked ~15% of the time. <b>Likely characters win more often, but unlikely ones still happen</b> — which is what makes generation varied.`);
  }

  /* ---------- 5 · generate ---------- */
  else if(id===5){
    scaffold(`<div class="row">${heatmapHTML(false)}${nameHTML()}</div>`);
    setEqIdle("start at '.', then sample → hop → repeat");
    await step(200,run);
    let cur=0;const out=[];renderName(out,null);let guard=0;
    while(guard++<40){
      clearLit();litRow(cur);
      setEq(`\\text{current} = ${tex(cur)}\\ \\Rightarrow\\ \\text{sample from } P(\\text{next}\\mid ${tex(cur)})`);
      await step(260,run);
      const ix=sample(P[cur]);ping(cur,ix);flow(cell(cur,ix),$("namebox"),getCSS("--signal"));
      setEq(`\\text{sampled }${ix===0?'\\cdot\\ (\\text{end})':tex(ix)}\\quad p=${fx(P[cur][ix],3)}`);
      if(ix===0){renderName(out,'.');await step(360,run);break;}
      out.push(labelOf(ix));renderName(out,null);await step(170,run);cur=ix;
    }
    clearLit();const name=out.join("");state.gen.unshift(name);if(state.gen.length>12)state.gen.pop();
    $("genlist").innerHTML=state.gen.map(n=>`<span class="genname">${n}</span>`).join("");
    setEq(`\\hat{\\text{name}} = \\text{“${name}”}`);
    $("stage").insertAdjacentHTML("beforeend",`<div class="endcap">▸ press ▶ again for another — each name is a fresh random walk</div>`);
  }

  /* ---------- 6 · loss ---------- */
  else if(id===6){
    scaffold(`<div class="col" style="gap:14px">
      <div class="col"><div class="mxlabel">build the score for one example name</div><div class="wrapseq" id="lseq"></div></div>
      <div class="lossnum" id="ln">L = …</div></div>`);
    const seq=['.','e','m','m','a','.'];const ls=$("lseq");
    seq.forEach((c,k)=>{const t=document.createElement("div");t.className="tok"+(c==='.'?' dot':'');t.textContent=c==='.'?'.':c;t.id="lt_"+k;ls.appendChild(t);if(k<seq.length-1){const a=document.createElement("span");a.className="arr";a.id="la_"+k;a.textContent="→";ls.appendChild(a);}});
    setEq(`\\text{likelihood} = \\prod_{(i,j)} P(j\\mid i)\\ \\Rightarrow\\ \\text{log} \\Rightarrow \\text{sum},\\ \\text{negate, average}`);
    await step(500,run);
    let sumlog=0,n=0;
    for(let k=0;k<seq.length-1;k++){
      const i=STOI[seq[k]],j=STOI[seq[k+1]],p=P[i][j];sumlog+=Math.log(p);n++;
      $("lt_"+k).classList.add("lit");$("lt_"+(k+1)).classList.add("lit");
      setEq(`P(${tex(j)}\\mid ${tex(i)}) = ${fx(p,3)},\\quad -\\log p = ${fx(-Math.log(p),3)}`);
      await step(600,run);$("lt_"+k).classList.remove("lit");$("lt_"+(k+1)).classList.remove("lit");
    }
    $("ln").innerHTML=`average over <b>${TOTAL.toLocaleString()}</b> bigrams &nbsp;→&nbsp; <span style="color:var(--signal)">L = ${fx(AVG_NLL,4)}</span>`;
    setEq(`L = -\\frac{1}{n}\\sum_{(i,j)}\\log P(j\\mid i) = ${fx(AVG_NLL,4)}\\quad(\\text{uniform: }\\log 27 = ${fx(UNI,3)})`);
    addNote(`Each term <b>−log p</b> is the model's "surprise": confident-and-right (p near 1) → near 0; confident-and-wrong (p near 0) → huge. Averaging gives one score. <b>Lower is better</b>; a perfect model scores 0, random guessing scores ${fx(UNI,2)}. Our bigram model: <b>${fx(AVG_NLL,4)}</b> — well below random, so it has learned real structure. (This average NLL is exactly the <span class="c">cross-entropy</span> between the data and the model.)`);
  }

  /* ---------- 7 · perplexity ---------- */
  else if(id===7){
    scaffold(`<div class="col"><div class="cmp" id="cmp">
      <div class="cmprow"><div class="cmptop"><span>uniform guesser (no learning)</span><span id="pu">·</span></div><div class="cmptrack"><div class="cmpfill" id="fu" style="background:linear-gradient(90deg,#3b466a,#5C6680)"></div></div></div>
      <div class="cmprow"><div class="cmptop"><span style="color:var(--signal-2)">our bigram model</span><span id="pb" style="color:var(--signal-2)">·</span></div><div class="cmptrack"><div class="cmpfill" id="fb" style="background:linear-gradient(90deg,var(--signal),var(--signal-2))"></div></div></div>
    </div></div>`);
    setEq(`\\text{perplexity} = e^{\\,L}`);await step(400,run);
    $("fu").style.width="100%";$("pu").textContent="27.0 choices";
    setEq(`\\text{uniform: } e^{\\log 27} = 27`);await step(800,run);
    $("fb").style.width=(PPL/UNI_PPL*100).toFixed(1)+"%";$("pb").textContent=fx(PPL,1)+" choices";
    setEq(`\\text{bigram: } e^{${fx(AVG_NLL,3)}} \\approx ${fx(PPL,1)}`);await step(500,run);
    addNote(`Perplexity reads the loss as <b>"how many characters is the model effectively choosing between."</b> Pure guessing is confused among all <b>27</b>. Our bigram model is confused among only <b>~${fx(PPL,1)}</b> — it has more than halved the uncertainty just by knowing the single previous character.`);
  }

  /* ---------- 8 · smoothing ---------- */
  else if(id===8){
    const [zi,zj]=ZERO;const rs=rowSum(zi);
    scaffold(`<div class="row">${heatmapHTML(false)}<div class="col" id="smoothcol"><div class="mxlabel">a pair that never occurs: <b style="color:var(--bad)">${labelOf(zi)}${labelOf(zj)}</b></div></div></div>`);
    cell(zi,zj)?.classList.add("zero");ping(zi,zj);
    setEq(`N[${tex(zi)},${tex(zj)}] = 0`);
    await step(700,run);
    const col=$("smoothcol");
    col.insertAdjacentHTML("beforeend",`<div class="note r" style="border-left-color:var(--bad)">Without smoothing: $P = \\frac{0}{${rs}} = 0$, and the loss needs $\\log(0) = -\\infty$. <b>One</b> unseen pair makes the entire loss infinite.</div>`);
    renderNotes();setEq(`\\text{raw: } P = \\tfrac{0}{${rs}} = 0 \\Rightarrow \\log 0 = -\\infty`);
    await step(1100,run);
    const sm=(0+1)/(rs+V);
    col.insertAdjacentHTML("beforeend",`<div class="note good">Add-one smoothing: $P = \\frac{0+1}{${rs}+27} = ${fx(sm,5)}$ — tiny, but <b>not zero</b>, so the log is finite and the model is safe.</div>`);
    renderNotes();setEq(`P(j\\mid i) = \\dfrac{N[i,j] + 1}{\\sum_k (N[i,k] + 1)}`);
    addNote(`The misconception to drop: it isn't "divide by infinity". The count (numerator) is <b>0</b>, so the probability is 0, and it is <b>log(0) = −∞</b> that breaks the loss. Larger smoothing pushes every row toward <span class="c">uniform</span> (safer, less confident); this is the count-world twin of <b>L2 regularization</b> in the neural version.`);
  }

  /* ---------- 9 · neural twin ---------- */
  else if(id===9){
    const i=state.cur, raw=rawRow(i);
    scaffold(`<div class="col" style="gap:16px">
      <div class="col"><div class="mxlabel">one-hot the current character <b style="color:var(--signal)">${labelOf(i)}</b> → a length-27 vector (one 1, rest 0)</div><div class="onehot" id="oh"></div></div>
      <div class="row" style="gap:24px">${heatmapHTML(false)}${distHTML(i,raw,`softmax(logits) = P(next | ${labelOf(i)})`)}</div>
    </div>`);
    $("oh").innerHTML=ITOS.map((c,k)=>`<div class="ocell ${k===i?'one':''}" title="${c}">${k===i?'1':'0'}</div>`).join("");
    setEq(`\\text{logits} = x_{\\text{1-hot}}\\,W`);
    await step(500,run);
    litRow(i);
    setEq(`x\\ \\text{is one-hot} \\Rightarrow xW = \\text{row } ${tex(i)}\\text{ of } W\\ \\ (\\text{the “log-counts” for what follows }${tex(i)})`);
    await step(900,run);
    await fillDistAnim(i,raw,run,(j,p)=>`\\text{softmax: } p_${'{'+labelOf(j).replace('.','\\cdot')+'}'} = \\dfrac{e^{\\text{logit}_j}}{\\sum_k e^{\\text{logit}_k}} = ${fx(p,3)}`);
    addNote(`The 26 zeros are just placeholders that make the vector length 27 — they are not "erased". The single <b>1</b> at position ${i} makes <code>x·W</code> select <b>row ${i} of W</b>. If we read those numbers as <b>log-counts</b>, then $\\text{exp}$ gives counts and dividing by their sum (softmax) is exactly the row-normalization from step 3.`);
    addNote(`So the one-layer softmax network <b>is</b> the bigram model. Counting gets there directly; <span class="c">gradient descent</span> gets there by nudging W to minimize the same loss — and both land at L ≈ ${fx(AVG_NLL,2)}. That is the bridge from statistics to neural nets, and the next model (the <b>MLP</b>) keeps this exact loss while feeding in more context.`,'cool');
  }
}

/* ============================================================ orchestration ============================================================ */
function renderNav(){
  $("nav").innerHTML=STAGES.map(s=>`<button class="navitem ${s.id===state.stage?"on":(s.id<state.stage?"done":"")}" data-stage="${s.id}"><span class="ix">${String(s.id).padStart(2,"0")}</span><span class="nm">${s.name}</span></button>`).join("");
  $("nav").querySelectorAll(".navitem").forEach(b=>b.onclick=()=>jumpStage(+b.dataset.stage));
  $("prev").disabled=state.stage===0;$("next").disabled=state.stage===STAGES.length-1;
}
function renderChips(){
  $("chips").innerHTML=Array.from({length:V},(_,i)=>`<span class="chip ${i===state.cur?'lit':''}" data-c="${i}">${labelOf(i)}</span>`).join("");
  $("chips").querySelectorAll(".chip").forEach(c=>c.onclick=()=>{state.cur=+c.dataset.c;renderChips();const s=[3,4,9].includes(state.stage)?state.stage:3;jumpStage(s);});
  $("params").innerHTML=`<span>current=<b>${labelOf(state.cur)}</b></span><span>loss=<b>${fx(AVG_NLL,3)}</b></span><span>ppl=<b>${fx(PPL,1)}</b></span>`;
}
function setPlayLabel(){$("play").innerHTML=RUNNING&&!PAUSED?"❚❚ Pause":"▶ Play";}
async function runSingle(id){RUN++;const run=RUN;RUNNING=true;PAUSED=false;SKIP=false;state.stage=id;setPlayLabel();
  try{await animateStage(id,run);}catch(e){if(e!=="cancel")console.error(e);if(run===RUN){RUNNING=false;setPlayLabel();}return;}
  if(run===RUN){RUNNING=false;setPlayLabel();}}
function skipStage(){RUN++;const run=RUN;SKIP=true;RUNNING=false;PAUSED=false;setPlayLabel();animateStage(state.stage,run).catch(()=>{}).then(()=>{if(run===RUN)SKIP=false;});}
async function playAll(){RUN++;const run=RUN;RUNNING=true;PAUSED=false;SKIP=false;setPlayLabel();
  try{for(let s=state.stage;s<STAGES.length;s++){state.stage=s;renderNav();syncHash();await animateStage(s,run);if(run!==RUN)return;if(s<STAGES.length-1)await step(560,run);}}catch(e){return;}
  if(run===RUN){RUNNING=false;PAUSED=false;setPlayLabel();}}
function onPlay(){if(RUNNING){PAUSED=!PAUSED;setPlayLabel();return;}if(state.stage===5){runSingle(5);return;}if(state.stage===STAGES.length-1)state.stage=0;playAll();}
function jumpStage(id){RUN++;state.stage=id;renderNav();renderChips();syncHash();runSingle(id);}
function gotoPrev(){if(state.stage>0)jumpStage(state.stage-1);}
function gotoNext(){if(state.stage<STAGES.length-1)jumpStage(state.stage+1);}
function syncHash(){try{history.replaceState(null,"",`#st=${state.stage}&c=${state.cur}`);}catch(e){}}
function readHash(){try{const r=location.hash.replace(/^#/,"");if(!r)return null;const p={};r.split("&").forEach(kv=>{const i=kv.indexOf("=");if(i>0)p[kv.slice(0,i)]=kv.slice(i+1);});return p;}catch(e){return null;}}

/* ---- export ---- */
let recording=false,_gw=null;const BG=()=>getComputedStyle(document.body).backgroundColor||"#0A0D13";const APP=()=>document.querySelector(".app");
function expStat(m,e){const x=$("expstat");if(!x)return;if(!m){x.style.display="none";return;}x.style.display="";x.classList.toggle("err",!!e);x.textContent=m;}
function dl(b,n){const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=n;a.click();setTimeout(()=>URL.revokeObjectURL(u),5000);}
function drawContain(c,img,W,H){const s=Math.min(W/img.width,H/img.height),w=img.width*s,h=img.height*s;c.drawImage(img,(W-w)/2,(H-h)/2,w,h);}
function resetExp(){["expgif","exppng"].forEach(id=>{const b=$(id);if(b){b.disabled=false;b.classList.remove("rec");}});}
async function gwURL(){if(_gw)return _gw;const r=await fetch("https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js");_gw=URL.createObjectURL(new Blob([await r.text()],{type:"application/javascript"}));return _gw;}
async function snapPNG(){if(!window.htmlToImage){expStat("capture lib not loaded",true);return;}expStat("rendering PNG…");try{const d=await htmlToImage.toPng(APP(),{pixelRatio:1.5,backgroundColor:BG()});dl(await(await fetch(d)).blob(),`bigram-${Date.now()}.png`);expStat("PNG downloaded.");}catch(e){expStat("failed: "+(e.message||e),true);}}
async function recordGIF(){if(recording)return;if(!window.GIF||!window.htmlToImage){expStat("export lib not loaded",true);return;}
  recording=true;PAUSED=false;SKIP=false;$("expgif").disabled=$("exppng").disabled=true;$("expgif").classList.add("rec");expStat("preparing…");
  let wu;try{wu=await gwURL();}catch(e){expStat("worker load failed",true);recording=false;resetExp();return;}
  const node=APP(),rect=node.getBoundingClientRect(),W=Math.min(1000,Math.round(rect.width)),scale=W/rect.width,H=Math.min(1300,Math.round(rect.height*scale));
  const fr=document.createElement("canvas");fr.width=W;fr.height=H;const fc=fr.getContext("2d");
  const gif=new GIF({workers:2,quality:12,width:W,height:H,workerScript:wu,background:"#0A0D13"});
  let cap=true,frames=0,last=performance.now();
  const loop=(async()=>{while(cap){try{const snap=await htmlToImage.toCanvas(node,{pixelRatio:scale,backgroundColor:BG()});fc.fillStyle=BG();fc.fillRect(0,0,W,H);drawContain(fc,snap,W,H);const now=performance.now(),delay=Math.max(60,Math.min(400,Math.round(now-last)));last=now;gif.addFrame(fc,{copy:true,delay});frames++;if(frames%4===0)expStat(`capturing… ${frames}`);}catch(e){}await sleep(110);}})();
  RUN++;const r=RUN;expStat("recording…");try{await animateStage(state.stage,r);}catch(e){}await sleep(450);cap=false;await loop;
  if(!frames){expStat("no frames (try Chrome)",true);recording=false;resetExp();return;}
  expStat(`encoding… ${frames} frames`);gif.on("progress",p=>expStat(`encoding… ${Math.round(p*100)}%`));
  gif.on("finished",b=>{recording=false;resetExp();expStat(`done — ${(b.size/1048576).toFixed(1)} MB`);dl(b,`bigram-${Date.now()}.gif`);});gif.render();}

/* ---- wiring ---- */
$("play").onclick=onPlay;$("prev").onclick=gotoPrev;$("next").onclick=gotoNext;$("skip").onclick=skipStage;$("replay").onclick=()=>jumpStage(state.stage);
$("speed").querySelectorAll("button").forEach(b=>b.onclick=()=>{SPEED=+b.dataset.s;$("speed").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));});
$("expgif").onclick=recordGIF;$("exppng").onclick=snapPNG;
$("copylink").onclick=()=>{const b=$("copylink");const done=()=>{b.classList.add("copied");b.textContent="✓ Link copied";setTimeout(()=>{b.classList.remove("copied");b.textContent="🔗 Copy link";},1600);};try{navigator.clipboard.writeText(location.href).then(done,done);}catch(e){done();}};
document.addEventListener("keydown",e=>{if(e.target.tagName==="INPUT")return;if(e.key==="ArrowLeft")gotoPrev();if(e.key==="ArrowRight")gotoNext();if(e.key===" "){e.preventDefault();onPlay();}if(e.key==="Enter")skipStage();});

function boot(){if(!window.katex){setTimeout(boot,60);return;}
  const p=readHash();if(p&&p.c!=null)state.cur=Math.max(0,Math.min(26,+p.c||0));
  renderChips();renderNav();setPlayLabel();
  const st=p&&p.st!=null?+p.st:0;state.stage=(st>=0&&st<STAGES.length)?st:0;runSingle(state.stage);}
boot();
</script>
</body>
