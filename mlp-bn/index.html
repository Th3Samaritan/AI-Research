<script>
"use strict";
/* ============================================================
   MLP + BatchNorm, Animated
   makemore Part 3 — build_makemore_batchnorm.ipynb
   ============================================================ */

/* ---- PRNG & weight generation ---- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function mkrandn(rng){let s=null;return()=>{if(s!==null){const v=s;s=null;return v;}let u,v,r;do{u=rng()*2-1;v=rng()*2-1;r=u*u+v*v;}while(r>=1||!r);const c=Math.sqrt(-2*Math.log(r)/r);s=v*c;return u*c;};}

const _rng=mulberry32(20240315);
const _randn=mkrandn(_rng);
function genmat(r,c,sc){return Array(r).fill(0).map(()=>Array(c).fill(0).map(()=>_randn()*sc));}
function genvec(n,v=0){return Array(n).fill(v);}

/* ---- Architecture ---- */
const V=27,BLOCK=3,EMB=10,NHID=64,BATCH=8;
const NPARAMS=V*EMB + BLOCK*EMB*NHID + NHID*2 + NHID*V + V;

const ITOS=[".",..."abcdefghijklmnopqrstuvwxyz"];
const STOI={};ITOS.forEach((c,i)=>STOI[c]=i);

/* ---- Weights (Kaiming-scaled random, seeded for reproducibility) ---- */
const C   = genmat(V,  EMB,  1.0);
const W1  = genmat(BLOCK*EMB, NHID, (5/3)/Math.sqrt(BLOCK*EMB)); // Kaiming-tanh
const W2  = genmat(NHID, V,  0.08);
const b2  = genvec(V, 0);
const GAMMA       = genvec(NHID, 1.0);
const BETA        = genvec(NHID, 0.0);
// Running stats — as if trained for a few thousand steps (slight drift from 0/1)
const BN_MEAN_RUN = Array(NHID).fill(0).map(()=>(_randn()*0.08));
const BN_STD_RUN  = Array(NHID).fill(0).map(()=>(1 + _randn()*0.05));

/* ---- Fixed batch contexts for BN statistics (7 + user's = 8) ---- */
const FIXED_CTXS=[
  [0,0,5],   // ..e
  [0,5,13],  // .em
  [5,13,13], // emm
  [0,0,15],  // ..o
  [0,15,12], // .ol
  [15,12,9], // oli
  [0,0,1],   // ..a
];

/* ---- Math helpers ---- */
function matvec_nhid(embcat){return Array(NHID).fill(0).map((_,j)=>embcat.reduce((s,v,i)=>s+v*W1[i][j],0));}
function matvec_out(h){return Array(V).fill(0).map((_,k)=>h.reduce((s,v,j)=>s+v*W2[j][k],0)+b2[k]);}
function softmax(logits){const m=Math.max(...logits);const ex=logits.map(v=>Math.exp(v-m));const z=ex.reduce((a,b)=>a+b,0);return {probs:ex.map(v=>v/z),counts:ex,Z:z};}
function embed(ctx){return ctx.map(i=>C[i]);}
function batchHpres(ctx){return [ctx,...FIXED_CTXS].map(bc=>{const e=bc.map(i=>C[i]).flat();return matvec_nhid(e);});}

function forward(ctx,use_running=false){
  const emb=embed(ctx);
  const embcat=emb.flat();
  const hpre=matvec_nhid(embcat);
  let mu,std,sigma2;
  if(use_running){mu=BN_MEAN_RUN;std=BN_STD_RUN;sigma2=std.map(s=>s*s);}
  else{
    const hpres=batchHpres(ctx);
    mu=Array(NHID).fill(0).map((_,j)=>hpres.reduce((s,h)=>s+h[j],0)/BATCH);
    sigma2=Array(NHID).fill(0).map((_,j)=>hpres.reduce((s,h)=>s+(h[j]-mu[j])**2,0)/BATCH);
    std=sigma2.map(v=>Math.sqrt(v+1e-5));
  }
  const hhat=hpre.map((v,j)=>(v-mu[j])/std[j]);
  const hbn=hhat.map((v,j)=>GAMMA[j]*v+BETA[j]);
  const h=hbn.map(v=>Math.tanh(v));
  const logits=matvec_out(h);
  const {probs,counts,Z}=softmax(logits);
  return {emb,embcat,hpre,mu,sigma2,std,hhat,hbn,h,logits,probs,counts,Z};
}

/* ---- Stage definitions ---- */
const STAGES=[
  {id:0,name:"Vocabulary",      desc:"Encode 26 letters + '.' as integers 0–26."},
  {id:1,name:"Context window",  desc:"Slide a 3-char window over names to build (X, Y) training pairs."},
  {id:2,name:"Embeddings C",    desc:"Look up each context character's 10-dim vector in the C table, then concatenate to 30."},
  {id:3,name:"Linear W1",       desc:"Project the 30-dim embedding to 64 pre-activations — no bias, because BN will centre them."},
  {id:4,name:"BN · batch stats",desc:"Compute the mean μ and variance σ² of h_pre across all 8 examples in the mini-batch."},
  {id:5,name:"BN · normalise",  desc:"Subtract the batch mean, divide by the standard deviation → zero mean, unit variance."},
  {id:6,name:"BN · scale & shift",desc:"Multiply by learnable γ and add learnable β — restoring the network's expressiveness."},
  {id:7,name:"Tanh",            desc:"Squash h_BN through tanh → every value in (−1, +1). Check for saturation."},
  {id:8,name:"Output logits",   desc:"Compute logits = h·W2 + b2 — 27 raw scores, one per possible next character."},
  {id:9,name:"Softmax & loss",  desc:"Softmax turns logits into probabilities; cross-entropy scores the prediction: L = −log p(true)."},
  {id:10,name:"Running stats (EMA)",desc:"During training, track running μ and σ via an exponential moving average — used later at inference."},
  {id:11,name:"Training loop",  desc:"Minibatch SGD: forward, backprop, p ← p − η·∂L/∂p. BN lets the deep net actually converge."},
  {id:12,name:"Generate name",  desc:"Inference: slide the context, forward with running stats, sample, repeat."},
];

/* ---- runtime state ---- */
const $=id=>document.getElementById(id);
let SPEED=1,RUN=0,RUNNING=false,PAUSED=false,SKIP=false;
const state={stage:0,ctx:[0,0,0],gen:[]};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function step(ms,run){return new Promise((res,rej)=>{
  if(run!==RUN)return rej("cancel");
  if(SKIP)return res();
  function tick(){if(run!==RUN)return rej("cancel");if(SKIP)return res();if(!PAUSED)return res();setTimeout(tick,80);}
  setTimeout(tick,ms*SPEED);
});}

const fx=(v,d=3)=>v.toFixed(d);
function dcol(v,scale=1){
  const t=Math.max(-1,Math.min(1,v/scale));
  if(t<0){const r=Math.round(31+(-t)*(80-31)),g=Math.round(37+(-t)*(60-37)),b=Math.round(64+(-t)*(220-64));return`rgb(${r},${g},${b})`;}
  const r=Math.round(31+t*(220-31)),g=Math.round(37+t*(120-37)),b=Math.round(64+t*(40-64));return`rgb(${r},${g},${b})`;
}
function bnCol(v){
  const t=Math.max(-1,Math.min(1,v));
  if(t<0){const r=Math.round(28+(-t)*120),g=Math.round(20+(-t)*40),b=Math.round(55+(-t)*195);return`rgb(${r},${g},${b})`;}
  const r=Math.round(28+t*150),g=Math.round(20+t*90),b=Math.round(55+t*200);return`rgb(${r},${g},${b})`;
}

function setEq(tex){const b=$("bar"),eq=$("eqbox");b.classList.remove("idle");try{katex.render(tex,eq,{throwOnError:false,displayMode:false});}catch(e){eq.textContent=tex;}}
function setEqIdle(txt){const b=$("bar"),eq=$("eqbox");b.classList.add("idle");eq.textContent=txt;}
function scaffold(html){$("stage").innerHTML=html;$("notes").innerHTML="";}
function addNote(html,cls=""){const d=document.createElement("div");d.className="note"+(cls?" "+cls:"");d.innerHTML=html;$("notes").appendChild(d);}
function lab(i){return ITOS[i]||"?";}
function sample(probs){let r=Math.random(),c=0;for(let i=0;i<probs.length;i++){c+=probs[i];if(r<c)return i;}return probs.length-1;}

/* ---- HTML builders ---- */
function ctxHTML(){
  return`<div class="panel"><div class="ptitle">context<span class="sz"> (3 chars)</span></div><div class="ctxrow">${state.ctx.map((c,k)=>`<div class="ctxbox" id="cb_${k}">${ITOS[c]==='.'?'<span class=d>.</span>':ITOS[c]}</div>`).join("")}</div></div>`;
}
function embHTML(){
  return`<div class="panel"><div class="ptitle">embeddings C[ctx]<span class="sz"> (3×10)</span></div><div class="emb">${state.ctx.map((c,r)=>`<div class="embrow"><span class="rl">${ITOS[c]==='.'?'·':ITOS[c]}</span>${Array(EMB).fill(0).map((_,k)=>`<div class="vcell" id="ev_${r}_${k}"></div>`).join("")}</div>`).join("")}</div></div>`;
}
function hidHTML(p="hc"){

}
function paintHid(vals,p="hc",scale=2){vals.forEach((v,j)=>{const el=$(p+"_"+j);if(el)el.style.background=dcol(v,scale);});}
function distHTML(label='P(next char)'){

function paintDist(probs,fmt=j=>fx(probs[j]*100,1)+"%"){probs.forEach((p,j)=>{const fl=$(`df_${j}`),pc=$(`dp_${j}`);if(fl)fl.style.width=(p*100).toFixed(2)+"%";if(pc)pc.textContent=p>0.001?fmt(j):"·";});}
function nameHTML(){
  return`<div class="panel"><div class="ptitle">generated</div><div class="namebox" id="namebox"><span class="dot">.</span><span class="cursor"></span></div><div class="genlist" id="genlist">${state.gen.map(n=>`<span class="genname">${n}</span>`).join("")}</div></div>`;
}
function renderName(out,done){const nb=$("namebox");if(!nb)return;const cur=done?`<span class="dot">.</span>`:`<span class="cursor"></span>`;nb.innerHTML=out.map(c=>`<span class="cur">${c}</span>`).join("")+cur;}

/* ---- batch table (BN stages) — shows first 8 of 64 neurons ---- */
const BCOLS=8;
function batchTableHTML(hpres){
  const labels=[[...state.ctx],...FIXED_CTXS].map(bc=>bc.map(i=>ITOS[i]==='.'?'·':ITOS[i]).join(''));
  let h=`<div class="btable" id="btable">`;
  h+=`<div class="brow"><div class="blabel"></div>${Array(BCOLS).fill(0).map((_,j)=>`<div style="width:22px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted-2)">${j}</div>`).join("")}</div>`;
  hpres.forEach((row,i)=>{
    h+=`<div class="brow ${i===0?'user':''}" id="br_${i}"><div class="blabel">${labels[i]}</div>`;
    for(let j=0;j<BCOLS;j++)h+=`<div class="bcell" id="bc_${i}_${j}" style="background:${dcol(row[j],3)}"></div>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}

/* ============================================================
   STAGE RENDERING
   ============================================================ */
async function animateStage(id,run){
  $("stageno").textContent=`Step ${String(id).padStart(2,"0")} / ${STAGES.length-1} · ${NPARAMS.toLocaleString()} params`;
  $("stagetitle").textContent=STAGES[id].name;
  $("stagedesc").textContent=STAGES[id].desc;
  $("hint").innerHTML=id>=2&&id<=9?`Edit the <b>context</b> in the sidebar (e.g. <b>emm</b>) to watch the numbers change.`:``;
  renderNav();
  const f=forward(state.ctx);

  /* ---- 0 · vocabulary ---- */
  if(id===0){
    scaffold(`<div class="panel"><div class="ptitle">27 tokens: 26 letters + '.' for start/end</div><div class="vocab" id="vocab"></div></div>`);
    setEqIdle("characters can't enter a network — encode each as an integer index");
    await step(300,run);
    $("vocab").innerHTML=ITOS.map((c,i)=>`<div class="vchip ${c==='.'?'dot':''}" id="vk_${i}" style="opacity:.2"><div class="ch">${c}</div><div class="ix">${i}</div></div>`).join("");
    for(let i=0;i<27;i++){$(`vk_${i}`).style.opacity="1";setEq(`\\texttt{stoi[${ITOS[i]==='.'?'\\cdot':ITOS[i]}]}=${i}`);await step(60,run);}
    addNote(`<code>stoi = {s:i+1 for i,s in enumerate(chars)}</code> then <code>stoi['.'] = 0</code>. The <b>+1</b> shifts letters up so index 0 is free for <b>'.'</b> — used both as padding before a name starts and as the end-of-name marker. Vocab size = 27. <i>Every</i> downstream shape — the 27 rows of C, the 27 logits, the 27-way softmax — comes from this count.`);
  }

  /* ---- 1 · context window ---- */
  else if(id===1){
    scaffold(`<div style="display:flex;flex-direction:column;gap:18px">
      <div class="panel"><div class="ptitle">a few of the 32,033 names</div><div class="nlist">${["emma","olivia","ava","isabella","ethan"].map(n=>`<span class="nameitem">${n}</span>`).join("")}</div></div>
      <div class="panel"><div class="ptitle">sliding a 3-char window over <b style="color:var(--good)">emma</b></div><div class="cwrows" id="cw"></div></div>
    </div>`);
    setEqIdle("each name → several (context → next char) examples");
    await step(300,run);
    const seq=['.','.','.','e','m','m','a','.'];
    const rows=[];for(let t=3;t<seq.length;t++)rows.push([seq.slice(t-3,t),seq[t]]);
    $("cw").innerHTML=rows.map((r,k)=>`<div class="cwrow" id="cw_${k}">${r[0].map(c=>`<div class="cb ${c==='.'?'d':''}">${c}</div>`).join("")}<span class="cwarr">→</span><div class="cwt">${r[1]==='.'?'.':r[1]}</div><span class="cwidx">X=[${r[0].map(c=>STOI[c]).join(',')}]&nbsp; Y=${STOI[r[1]]}</span></div>`).join("");
    for(let k=0;k<rows.length;k++){const el=$(`cw_${k}`);el.classList.add("show","lit");setEq(`[${rows[k][0].map(c=>STOI[c]).join(',')}]\\rightarrow${STOI[rows[k][1]]}\\quad(\\texttt{${rows[k][0].join('')}}\\to\\texttt{${rows[k][1]}})`);await step(360,run);el.classList.remove("lit");}
    addNote(`The window starts as <code>[0,0,0]</code> and slides right: <code>context = context[1:] + [ix]</code>. Over all 32K names this yields about <b>228K</b> training examples. Each is 3 integer inputs in <b>X</b> + one integer target in <b>Y</b>.`);
    addNote(`Dataset splits: <b>182,625</b> train · <b>22,655</b> dev · <b>22,866</b> test (80/10/10). The dev set is held out — used only to measure generalisation to names the model never trained on.`,'cool');
  }

  /* ---- 2 · embeddings ---- */
  else if(id===2){
    scaffold(`<div class="pipe">${ctxHTML()}<span class="glyph">→</span>${embHTML()}<span class="glyph">→</span><div class="panel"><div class="ptitle">embcat<span class="sz"> (30)</span></div><div style="display:flex;gap:2px;flex-wrap:wrap;max-width:200px">${Array(30).fill(0).map((_,k)=>`<div class="vcell" id="cc_${k}"></div>`).join("")}</div></div></div>`);
    setEq(`\\text{emb}=C[\\text{ctx}]\\in\\mathbb{R}^{3\\times10}\\;\\Rightarrow\\;\\text{embcat}=\\text{emb.view(-1)}\\in\\mathbb{R}^{30}`);
    for(let r=0;r<BLOCK;r++){
      $(`cb_${r}`)?.classList.add("lit");
      setEq(`C[\\,${ITOS[state.ctx[r]]==='.'?'\\cdot':ITOS[state.ctx[r]]}\\,]=[${f.emb[r].slice(0,4).map(v=>fx(v,2)).join(',\\,')}\\dots]`);
      for(let k=0;k<EMB;k++){const el=$(`ev_${r}_${k}`);if(el){el.style.background=dcol(f.emb[r][k],1.5);el.classList.remove("ping");void el.offsetWidth;el.classList.add("ping");}await step(35,run);}
      for(let k=0;k<EMB;k++){const el=$(`cc_${r*EMB+k}`);if(el){el.style.background=dcol(f.emb[r][k],1.5);el.classList.remove("ping");void el.offsetWidth;el.classList.add("ping");}}
      await step(190,run);$(`cb_${r}`)?.classList.remove("lit");
    }
    setEq(`\\text{emb.view(-1,30)}:\\;(3,10)\\rightarrow(30)\\quad\\text{just a view, no copy}`);
    addNote(`Each character index selects one row of C — identical to multiplying a one-hot vector by C, just instant. The 10 values per character encode learned similarities. <b>Blue = negative, amber = positive.</b>`);
    addNote(`<b>Why dense 10-dim vectors?</b> A 27-wide one-hot treats every character as independent. A learned 10-dim embedding lets the model place similar characters near each other, so a pattern learned in one context transfers to others — the generalisation a sparse count table can't get (Bengio 2003).`,'cool');
  }

  /* ---- 3 · linear W1 (no bias) ---- */
  else if(id===3){
    const hstd=Math.sqrt(f.hpre.reduce((s,v)=>s+v*v,0)/NHID);
    scaffold(`<div class="pipe"><div class="panel"><div class="ptitle">embcat<span class="sz"> (30)</span></div><div style="display:flex;gap:2px;flex-wrap:wrap;max-width:200px">${Array(30).fill(0).map((_,k)=>`<div class="vcell" id="ec_${k}" style="background:${dcol(f.embcat[k],1.5)}"></div>`).join("")}</div></div><span class="glyph">@</span><div class="panel"><div class="ptitle">W1<span class="sz"> (30×64)</span></div><div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);max-width:150px;line-height:1.7">Kaiming-tanh<br>scale = (5/3)/√30<br>≈ ${fx((5/3)/Math.sqrt(30),4)}</div></div><span class="glyph">→</span><div class="panel"><div class="ptitle">h_pre<span class="sz"> (64)</span></div>${hidHTML()}</div></div>`);
    setEq(`h_{\\text{pre}}=\\text{embcat}\\cdot W_1,\\quad W_1\\in\\mathbb{R}^{30\\times64},\\quad\\text{no bias}`);
    await step(400,run);
    for(let j=0;j<NHID;j++){const el=$(`hc_${j}`);if(el){el.style.background=dcol(f.hpre[j],3);if(j%8===0){el.classList.remove("ping");void el.offsetWidth;el.classList.add("ping");}}if(j%16===0)await step(28,run);}
    setEq(`h_{\\text{pre},j}=\\sum_{i=0}^{29}\\text{embcat}_i\\,W_{1,ij}\\quad\\Rightarrow\\quad\\text{std}\\approx${fx(hstd,2)}`);
    addNote(`<b>No bias here</b> — BatchNorm is next. BN subtracts the batch mean μ, which would cancel any additive bias immediately. BN's own <b>β</b> parameter takes over the bias role. Adding a bias would just waste a parameter (this is why the deeper model uses <code>Linear(..., bias=False)</code>).`);
    addNote(`<b>Kaiming-tanh init:</b> <code>W1 *= (5/3) / √n_in</code> with n_in = 30. Without it, std(h_pre) ≈ √30 ≈ 5.5, pushing most inputs deep into the tanh flat zone before training starts. The <b>5/3</b> is the tanh gain — it corrects the slight squashing tanh applies to a unit-Gaussian input.`,'cool');
  }

  /* ---- 4 · BN: batch statistics ---- */
  else if(id===4){
    const hpres=batchHpres(state.ctx);
    const mu=f.mu, sigma2=f.sigma2;
    scaffold(`<div class="pipe"><div class="panel"><div class="ptitle">mini-batch h_pre<span class="sz"> (8 examples × first 8 of 64 neurons)</span></div>${batchTableHTML(hpres)}</div></div>`);
    setEqIdle("scan the batch column by column → compute μ and σ² for each neuron");
    await step(350,run);
    // mean pass
    for(let j=0;j<BCOLS;j++){
      for(let i=0;i<BATCH;i++)$(`bc_${i}_${j}`)?.classList.add("ping");
      setEq(`\\mu_{${j}}=\\tfrac{1}{8}\\sum_{i}h_{\\text{pre},i,${j}}=${fx(mu[j],3)}`);
      await step(230,run);
      for(let i=0;i<BATCH;i++)$(`bc_${i}_${j}`)?.classList.remove("ping");
      addMuCell(j,mu[j]);
    }
    await step(350,run);
    // variance pass
    for(let j=0;j<BCOLS;j++){
      for(let i=0;i<BATCH;i++)$(`bc_${i}_${j}`)?.classList.add("ping");
      setEq(`\\sigma^2_{${j}}=\\tfrac{1}{8}\\sum_i(h_{\\text{pre},i,${j}}-${fx(mu[j],2)})^2=${fx(sigma2[j],3)}`);
      await step(210,run);
      for(let i=0;i<BATCH;i++)$(`bc_${i}_${j}`)?.classList.remove("ping");
      addS2Cell(j,sigma2[j]);
    }
    setEq(`\\mu\\in\\mathbb{R}^{64},\\;\\sigma^2\\in\\mathbb{R}^{64}\\quad\\text{(one value per neuron, over all 8 examples)}`);
    addNote(`BatchNorm computes statistics <b>across the batch dimension</b>: each of the 64 neurons gets its <i>own</i> μ and σ². Crucially this is <b>not</b> normalising across neurons within one example — every neuron independently tracks its mean and spread over the batch.`);
    addNote(`<b>Your context is example 0 (top, violet).</b> The other 7 rows are fixed contexts simulating a real mini-batch. Edit the context input above — example 0 changes, and μ / σ² update with it.`,'bn');
    addNote(`<b>The coupling:</b> because μ and σ² are shared, sample <i>i</i>'s output depends on <i>every</i> other sample in the batch. That's why BN needs a reasonable batch size (the notebook trains with B=32) — and why its backprop is more involved than a plain elementwise op.`,'cool');
  }

  /* ---- 5 · BN: normalise ---- */
  else if(id===5){
    scaffold(`<div class="pipe"><div class="panel"><div class="ptitle">h_pre (raw)<span class="sz"> (64)</span></div>${hidHTML("hp")}</div><span class="glyph">→</span><div class="panel"><div class="ptitle" style="color:var(--bn)">ĥ (normalised)<span class="sz"> mean≈0 std≈1</span></div>${hidHTML("hh")}</div></div>`);
    paintHid(f.hpre,"hp",3);
    setEq(`\\hat{h}=\\dfrac{h_{\\text{pre}}-\\mu}{\\sqrt{\\sigma^2+\\varepsilon}}\\quad(\\varepsilon=10^{-5})`);
    await step(450,run);
    for(let j=0;j<NHID;j++){
      const el=$("hh_"+j);
      if(el){el.style.background=bnCol(f.hhat[j]);if(j%8===0){el.classList.remove("ping");void el.offsetWidth;el.classList.add("ping");}}
      if(j%12===0){setEq(`\\hat{h}_{${j}}=\\dfrac{${fx(f.hpre[j],2)}-${fx(f.mu[j],2)}}{${fx(f.std[j],2)}}=${fx(f.hhat[j],3)}`);await step(34,run);}
    }
    const m=f.hhat.reduce((s,v)=>s+v,0)/NHID, sd=Math.sqrt(f.hhat.reduce((s,v)=>s+(v-m)**2,0)/NHID);
    setEq(`\\text{after BN: mean}\\approx${fx(m,2)},\\;\\text{std}\\approx${fx(sd,2)}\\quad(\\approx 0\\text{ and }1)`);
    addNote(`Every neuron's activations now have mean≈0 and std≈1 <b>across the batch</b>. This stops any single neuron with large weights from dominating and saturating tanh for every example. <b>Violet = negative, purple = positive</b>, all near 0 now.`);
    addNote(`<b>ε = 1e-5</b> guards against division by zero when a neuron's variance is exactly 0 (e.g. identical weights at init). Negligible otherwise. In the notebook's inline code this is folded into <code>bnstdi = hpreact.std(0, keepdim=True)</code>.`,'cool');
  }

  /* ---- 6 · BN: scale & shift (γ, β) ---- */
  else if(id===6){
    scaffold(`<div style="display:flex;flex-direction:column;gap:14px">
      <div class="pipe"><div class="panel"><div class="ptitle" style="color:var(--bn)">ĥ</div>${hidHTML("hh2")}</div><span class="glyph">→</span><div class="panel"><div class="ptitle" style="color:var(--signal)">h_BN = γĥ + β</div>${hidHTML("hbn")}</div></div>
      <div class="panel"><div class="ptitle">γ (bngain, init 1) <span class="sz">— scale, learnable</span></div><div class="paramrow">${Array(NHID).fill(0).map((_,j)=>`<div class="pcell" id="gc_${j}"></div>`).join("")}</div></div>
      <div class="panel"><div class="ptitle">β (bnbias, init 0) <span class="sz">— shift, learnable</span></div><div class="paramrow">${Array(NHID).fill(0).map((_,j)=>`<div class="pcell" id="bb_${j}"></div>`).join("")}</div></div>
    </div>`);
    paintHid(f.hhat,"hh2",2);
    GAMMA.forEach((v,j)=>{const el=$(`gc_${j}`);if(el)el.style.background=dcol(v-1,0.4);});
    BETA.forEach((v,j)=>{const el=$(`bb_${j}`);if(el)el.style.background=dcol(v,0.4);});
    setEq(`h_{\\text{BN}}=\\gamma\\odot\\hat{h}+\\beta,\\quad\\gamma\\in\\mathbb{R}^{64}\\;(\\text{init }1),\\;\\beta\\in\\mathbb{R}^{64}\\;(\\text{init }0)`);
    await step(400,run);
    for(let j=0;j<NHID;j++){
      const el=$("hbn_"+j);
      if(el){el.style.background=dcol(f.hbn[j],2);if(j%8===0){el.classList.remove("ping");void el.offsetWidth;el.classList.add("ping");}}
      if(j%16===0){setEq(`h_{\\text{BN},${j}}=${fx(GAMMA[j],2)}\\times${fx(f.hhat[j],2)}+${fx(BETA[j],2)}=${fx(f.hbn[j],3)}`);await step(30,run);}
    }
    setEq(`\\text{at init }\\gamma{=}1,\\beta{=}0\\;\\Rightarrow\\;h_{\\text{BN}}=\\hat{h}\\quad(\\text{identity transform})`);
    addNote(`<b>Why undo the normalisation with γ and β?</b> Forcing every layer to stay exactly mean=0, std=1 is too rigid — some features need a different scale or offset. γ and β are learned by gradient descent like any weight: <code>∂L/∂γ = Σ δ·ĥ</code>, <code>∂L/∂β = Σ δ</code>.`);
    addNote(`<b>Identity at init:</b> γ=1, β=0 means training begins with h_BN = ĥ exactly. The safest start — gradients are well-behaved from step 1, and the network discovers the optimal scale/shift over training. (In the deep model the <i>last</i> layer uses <code>gamma *= 0.1</code> to shrink initial logits.)`,'bn');
  }

  /* ---- 7 · tanh ---- */
  else if(id===7){
    const satPct=(f.h.filter(v=>Math.abs(v)>0.97).length/NHID*100).toFixed(0);
    scaffold(`<div class="pipe"><div class="panel"><div class="ptitle" style="color:var(--signal)">h_BN (input)</div>${hidHTML("hbn2")}</div><span class="glyph">→</span><div class="panel"><div class="ptitle">h = tanh(h_BN) <span class="sz">— ${satPct}% saturated</span></div><div class="tanh-row" id="tr">${Array(NHID).fill(0).map((_,j)=>`<div class="tcell" id="tc_${j}"><div class="tv">·</div></div>`).join("")}</div></div></div>`);
    paintHid(f.hbn,"hbn2",2);
    setEq(`h=\\tanh(h_{\\text{BN}}),\\qquad\\frac{d}{dx}\\tanh(x)=1-\\tanh^2(x)`);
    await step(420,run);
    for(let j=0;j<NHID;j++){
      const el=$(`tc_${j}`);const v=f.h[j];const sat=Math.abs(v)>0.97;
      if(el){el.style.background=dcol(v,1);el.classList.toggle("sat",sat);el.querySelector(".tv").textContent=fx(v,2);if(j%8===0){el.classList.remove("ping");void el.offsetWidth;el.classList.add("ping");}}
      if(j%10===0){setEq(`\\tanh(${fx(f.hbn[j],2)})=${fx(v,3)},\\;1-\\tanh^2=${fx(1-v*v,3)}${sat?"\\;\\color{#E5687A}{\\leftarrow\\text{saturated}}":""}`);await step(30,run);}
    }
    setEq(`\\text{${satPct}\\% neurons saturated }(|h|>0.97)\\Rightarrow\\text{gradient}\\times${fx(1-0.97**2,2)}\\text{ — BN kept this low}`);
    addNote(`A neuron is <b class="r">saturated</b> when |tanh|>0.97, i.e. |h_BN|>2.1. The gradient through tanh is 1−h², so a saturated neuron passes only <b>${fx((1-0.97**2)*100,0)}%</b> of its gradient. Red-bordered cells above are saturated.`);
    addNote(`<b>This is the whole point of BatchNorm.</b> Without it, after a few layers the activation distribution drifts and a large fraction of neurons saturate → gradients vanish → deep nets won't train. BN re-centres every layer's input near 0, keeping it in tanh's responsive zone, layer after layer.`,'bn');
  }

  /* ---- 8 · output logits ---- */
  else if(id===8){
    scaffold(`<div class="pipe"><div class="panel"><div class="ptitle">h<span class="sz"> (64)</span></div>${hidHTML("ho")}</div><span class="glyph">@W₂</span>${distHTML('logits — raw scores (27)')}</div>`);
    paintHid(f.h,"ho",1);
    setEq(`\\text{logits}=h\\,W_2+b_2\\in\\mathbb{R}^{27},\\quad W_2\\in\\mathbb{R}^{64\\times27}`);
    await step(400,run);
    const lg=f.logits,mn=Math.min(...lg),mx=Math.max(...lg);
    const order=lg.map((v,j)=>[j,v]).sort((a,b)=>b[1]-a[1]);
    for(const [j,v] of order){const fl=$(`df_${j}`),pc=$(`dp_${j}`),w=((v-mn)/((mx-mn)||1))*100;if(fl)fl.style.width=w.toFixed(1)+"%";if(pc)pc.textContent=fx(v,2);if(Math.abs(v)>0.005)setEq(`\\text{logit}_{${lab(j)==='.'?'\\cdot':lab(j)}}=${fx(v,3)}`);await step(40,run);}
    $(`dr_${order[0][0]}`)?.classList.add("top");
    setEq(`\\text{27 raw scores — can be negative, do }\\textbf{not}\\text{ sum to 1 yet}`);
    addNote(`Logits are <b>unnormalised scores</b> — the only learned layer after the hidden representation. W2 is initialised tiny (×0.08 here) so every logit starts near 0. The bars are scaled to the min/max for display; the largest logit becomes the most likely character after softmax (next step).`);
    addNote(`<b>BN's effect on this layer:</b> in the deeper 6-layer model the final block is <code>Linear → BatchNorm</code> and uses <code>layers[-1].gamma *= 0.1</code>, shrinking the output BN's scale so the very first logits are extra-flat → initial loss sits cleanly at −log(1/27) ≈ 3.30.`,'cool');
  }

  /* ---- 9 · softmax & loss ---- */
  else if(id===9){
    const top=f.probs.indexOf(Math.max(...f.probs));
    // pretend the "true" next char is the model's current argmax, for the loss demo
    const truth=top, Ltrue=-Math.log(f.probs[truth]);
    scaffold(`<div class="pipe"><div class="panel"><div class="ptitle">softmax → P(next char)</div>${distHTML('P(next char | ctx)')}</div><div class="panel" style="min-width:200px"><div class="ptitle">cross-entropy loss</div><div id="lossbox" style="font-family:'JetBrains Mono',monospace;background:#0d1320;border:1px solid var(--line);border-radius:11px;padding:16px 18px;font-size:13px;color:var(--muted);line-height:2;min-width:200px">waiting…</div></div></div>`);
    setEq(`\\textbf{step 1: } \\text{counts}=e^{\\text{logits}}\\quad(\\text{make every score positive})`);
    const cmax=Math.max(...f.counts);
    const order=f.counts.map((v,j)=>[j,v]).sort((a,b)=>b[1]-a[1]);
    for(const [j,v] of order){const fl=$(`df_${j}`),pc=$(`dp_${j}`);if(fl)fl.style.width=(v/cmax*100).toFixed(1)+"%";if(pc)pc.textContent=fx(v,2);if(v>0.05)setEq(`e^{${fx(f.logits[j],2)}}=${fx(v,2)}`);await step(42,run);}
    await step(350,run);
    setEq(`\\textbf{step 2: } p_j=\\dfrac{\\text{counts}_j}{\\sum_k \\text{counts}_k},\\quad\\textstyle\\sum_k=${fx(f.Z,2)}`);
    for(const [j,v] of order){const fl=$(`df_${j}`),pc=$(`dp_${j}`),p=f.probs[j];if(fl)fl.style.width=(p*100).toFixed(2)+"%";if(pc)pc.textContent=p>0.001?(p*100).toFixed(1)+"%":"·";$(`dr_${j}`)?.classList.toggle("top",j===order[0][0]);await step(46,run);}
    $(`dr_${top}`)?.classList.add("top");
    $(`dr_${truth}`)?.classList.add("truth");
    await step(300,run);
    setEq(`L=-\\log\\,p(\\text{true char})`);
    $("lossbox").innerHTML=`p("<span style="color:var(--good)">${lab(truth)==='.'?'·':lab(truth)}</span>") = <b style="color:var(--txt)">${fx(f.probs[truth],3)}</b><br>L = −log(${fx(f.probs[truth],3)})<br>= <b style="color:var(--signal);font-size:18px">${fx(Ltrue,3)}</b>`;
    setEq(`L=-\\log(${fx(f.probs[truth],3)})=${fx(Ltrue,3)}`);
    addNote(`<b>Softmax in two lines:</b> <code>counts = logits.exp()</code> then <code>counts / counts.sum(1, keepdims=True)</code>. It turns raw scores into a probability distribution that sums to 1. <code>F.cross_entropy</code> fuses a numerically-stable version of this with the log below.`);
    addNote(`<b>Cross-entropy</b> rewards probability mass on the true character: $L=-\\log p$. $-\\log(0.7)=0.36$ (good), $-\\log(0.05)=3.0$ (bad). It is a <span class="r">penalty in $[0,\\infty)$</span>, not a probability — a loss of 4.6 means $p\\approx0.01$, very wrong. At init, p≈1/27 for every char, so L≈3.30.`,'bad');
    addNote(`<b>BatchNorm doesn't change the loss</b> — softmax + cross-entropy are identical to the plain MLP and the bigram model. BN only changes <i>how stably the activations reach this point</i>, which is what lets the deeper network train at all.`,'cool');
  }

  /* ---- 10 · running statistics (EMA) ---- */
  else if(id===10){
    scaffold(`<div style="display:flex;flex-direction:column;gap:16px">
      <div class="panel"><div class="ptitle">EMA update of the running mean (neuron 0, watch it track the batch)</div>
        <div style="display:flex;flex-direction:column;gap:8px;max-width:520px;margin-top:6px">
          <div style="display:flex;align-items:center;gap:10px"><span style="width:64px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--signal)">μ_batch</span><div class="dtrack" style="height:18px"><div class="dfill" id="emb_batch" style="background:linear-gradient(90deg,#1F7A8C,var(--signal))"></div></div><span id="emv_batch" style="width:54px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)">·</span></div>
          <div style="display:flex;align-items:center;gap:10px"><span style="width:64px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--bn)">μ_run</span><div class="dtrack" style="height:18px"><div class="dfill" id="emb_run" style="background:linear-gradient(90deg,#5b3aa8,var(--bn))"></div></div><span id="emv_run" style="width:54px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)">·</span></div>
        </div>
      </div>
      <div class="panel"><div class="ptitle">step log</div><div id="emalog" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);line-height:1.8;background:#0d1320;border:1px solid var(--line);border-radius:10px;padding:12px 14px;max-width:520px"></div></div>
    </div>`);
    setEq(`\\mu_{\\text{run}}\\leftarrow(1-\\alpha)\\,\\mu_{\\text{run}}+\\alpha\\,\\mu_{\\text{batch}},\\quad\\alpha=0.001`);
    await step(350,run);
    let mu_run=0.0;
    const alpha=0.001;
    // simulate a sequence of batch means converging toward a true mean ~0.42
    const batchSeq=[0.61,0.38,0.55,0.29,0.47,0.40,0.52,0.35,0.44,0.41];
    const trueMean=0.42;
    const scaleBar=v=>((v+0.2)/1.0*100).toFixed(1)+"%"; // map ~[-0.2,0.8] to bar
    const log=$("emalog");
    for(let s=0;s<batchSeq.length;s++){
      // EMA over many micro-steps per shown batch to make drift visible
      const target=batchSeq[s];
      for(let t=0;t<200;t++) mu_run = (1-alpha*8)*mu_run + alpha*8*target;
      $("emb_batch").style.width=scaleBar(target);$("emv_batch").textContent=fx(target,3);
      $("emb_run").style.width=scaleBar(mu_run);$("emv_run").textContent=fx(mu_run,3);
      setEq(`\\text{step }${(s+1)*1000}:\\;\\mu_{\\text{run}}=${fx(mu_run,3)}\\;\\leftarrow\\;\\mu_{\\text{batch}}=${fx(target,3)}`);
      log.innerHTML=`step ${String((s+1)*1000).padStart(5)} · μ_batch=${fx(target,3)} · μ_run=<span style="color:var(--bn)">${fx(mu_run,3)}</span><br>`+log.innerHTML;
      await step(360,run);
    }
    setEq(`\\mu_{\\text{run}}\\to${fx(mu_run,3)}\\approx\\mathbb{E}[\\mu_{\\text{batch}}]\\quad\\text{(a smooth, batch-independent estimate)}`);
    addNote(`<b>Why track running stats?</b> At inference you might predict one character at a time — a batch of size 1 has no usable variance. So during <b>training</b>, BN keeps an exponential moving average of the batch mean and std, then <b>reuses them at test time</b>. The orange bar jitters (each batch differs); the violet bar glides smoothly toward the true mean.`);
    addNote(`<b>The update</b> runs inside <code>torch.no_grad()</code> because μ_run, σ_run are <i>not</i> trained by backprop — they're bookkeeping: <code>μ_run = 0.999·μ_run + 0.001·μ_batch</code>. α=0.001 (notebook inline) is very stable; the BatchNorm1d class uses α=0.1 for faster adaptation. <b>This is the train→inference bridge unique to BatchNorm.</b>`,'bn');
  }

  /* ---- 11 · training loop ---- */
  else if(id===11){
    scaffold(`<div style="display:flex;flex-direction:column;gap:14px">
      <div class="panel"><div class="ptitle">final loss after training (lower = better)</div>
        <div style="display:flex;flex-direction:column;gap:11px;max-width:480px;margin-top:6px">
          ${[['bigram (1 char context)','#5C6680','lb'],['this MLP — train','var(--good)','lt'],['this MLP — dev (held-out)','var(--signal)','ld']].map(r=>`<div><div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-bottom:4px"><span style="color:${r[1]}">${r[0]}</span><span id="${r[2]}">·</span></div><div class="dtrack" style="height:18px"><div class="dfill" id="f_${r[2]}" style="background:linear-gradient(90deg,#1F7A8C,${r[1]})"></div></div></div>`).join("")}
        </div>
      </div>
    </div>`);
    setEq(`p\\leftarrow p-\\eta\\,\\frac{\\partial L}{\\partial p}\\quad(\\text{minibatch SGD over all parameters})`);
    await step(450,run);
    const BIG=2.45,TR=2.04,DV=2.10,sc=v=>(v/3.30*100).toFixed(1)+"%";
    $("f_lb").style.width=sc(BIG);$("lb").textContent="2.45";await step(650,run);
    $("f_lt").style.width=sc(TR);$("lt").textContent="2.04";await step(550,run);
    $("f_ld").style.width=sc(DV);$("ld").textContent="2.10";await step(450,run);
    setEq(`\\text{train}\\approx2.04,\\;\\text{dev}\\approx2.10,\\;\\text{bigram}\\approx2.45`);
    addNote(`<b>One training step</b> = (1) sample a random minibatch of 32 examples; (2) forward to the loss; (3) <code>loss.backward()</code> — backprop including through every BatchNorm layer; (4) update <code>p.data += -lr * p.grad</code>. Learning rate is decayed: <code>0.1</code> early, <code>0.01</code> after ~100k steps.`);
    addNote(`<b>What BatchNorm buys you:</b> it makes training <i>robust to the exact weight initialisation</i> and lets you stack many layers without activations exploding or vanishing. The 6-layer deep net (47,024 params) trains smoothly to ≈2.0 — close to the well-tuned shallow MLP, but the architecture now scales.`,'bn');
    addNote(`<b>train ≈ dev</b> ⟹ the model is <span class="g">generalising</span>, not memorising. Both well below the bigram's 2.45 ⟹ more context + a hidden layer + stable deep training genuinely helped.`,'good');
  }

  /* ---- 12 · generate name ---- */
  else if(id===12){
    scaffold(`<div class="pipe" style="align-items:flex-start">${ctxHTML()}<span class="glyph">→</span>${distHTML('P(next char)')}${nameHTML()}</div>`);
    setEqIdle("inference: BN uses running stats μ_run, σ_run — not batch stats");
    await step(200,run);
    let ctx=[0,0,0];const out=[];renderName(out,null);let guard=0;
    while(guard++<32){
      for(let k=0;k<BLOCK;k++){const cb=$(`cb_${k}`);if(cb){cb.innerHTML=ITOS[ctx[k]]==='.'?'<span class=d>.</span>':ITOS[ctx[k]];cb.classList.add("lit");}}
      const ff=forward(ctx,true);paintDist(ff.probs);
      setEq(`\\text{ctx}=[${ctx.map(i=>ITOS[i]==='.'?'\\cdot':ITOS[i]).join(',')}]\\Rightarrow\\text{forward with }\\mu_{\\text{run}},\\sigma_{\\text{run}}`);
      await step(280,run);
      for(let k=0;k<BLOCK;k++)$(`cb_${k}`)?.classList.remove("lit");
      const ix=sample(ff.probs);$(`dr_${ix}`)?.classList.add("top");
      setEq(`\\text{sampled }${ix===0?'\\cdot\\;(\\text{end})':`\\text{“}${lab(ix)}\\text{”}`}\\;(p=${fx(ff.probs[ix],3)})`);
      if(ix===0){renderName(out,'.');await step(400,run);break;}
      out.push(lab(ix));renderName(out,null);ctx=ctx.slice(1).concat(ix);await step(180,run);
    }
    const name=out.join("");state.gen.unshift(name);if(state.gen.length>14)state.gen.pop();
    $("genlist").innerHTML=state.gen.map(n=>`<span class="genname">${n}</span>`).join("");
    setEq(`\\hat{\\text{name}}=\\text{“${name}”}`);
    $("stage").insertAdjacentHTML("beforeend",`<div class="endcap">▸ press ▶ again — a neural net running BatchNorm in your browser</div>`);
    addNote(`<b>Training vs inference BN.</b> In training, each mini-batch computes its own μ, σ² (coupling all examples). At inference you may predict one char at a time — a batch of 1 has no variance — so BN instead uses <b>running averages</b> accumulated during training: <code>bnmean_running</code>, <code>bnstd_running</code>.`);
    addNote(`The running stats update each step with an EMA: <code>μ_run ← 0.999·μ_run + 0.001·μ_batch</code> (and likewise for σ), inside a <code>torch.no_grad()</code> block. To switch the whole net over you set <code>layer.training = False</code> on every layer — the BatchNorm1d class then branches to the running-stats path.`,'bn');
  }
}

/* mu / sigma² row builders for the batch stats stage */
function addMuCell(j,val){
  let bt=$("btable");if(!bt)return;
  let row=$("br_mu");
  if(!row){row=document.createElement("div");row.className="brow stat";row.id="br_mu";row.innerHTML=`<div class="blabel">μ</div>${Array(BCOLS).fill(0).map((_,k)=>`<div class="bcell mu" id="bm_${k}"></div>`).join("")}`;bt.appendChild(row);}
  const c=$(`bm_${j}`);if(c){c.style.background=dcol(val,2);c.classList.remove("ping");void c.offsetWidth;c.classList.add("ping");}
}
function addS2Cell(j,val){
  let bt=$("btable");if(!bt)return;
  let row=$("br_s2");
  if(!row){row=document.createElement("div");row.className="brow stat";row.id="br_s2";row.innerHTML=`<div class="blabel">σ²</div>${Array(BCOLS).fill(0).map((_,k)=>`<div class="bcell" id="bs_${k}"></div>`).join("")}`;bt.appendChild(row);}
  const c=$(`bs_${j}`);if(c){c.style.background=dcol(val,1);c.classList.remove("ping");void c.offsetWidth;c.classList.add("ping");}
}

/* ============================================================ orchestration ============================================================ */
function renderNav(){
  $("nav").innerHTML=STAGES.map(s=>`<button class="navitem ${s.id===state.stage?"on":s.id<state.stage?"done":""}" data-stage="${s.id}"><span class="ix">${String(s.id).padStart(2,"0")}</span><span class="nm">${s.name}</span></button>`).join("");
  $("nav").querySelectorAll(".navitem").forEach(b=>b.onclick=()=>jumpStage(+b.dataset.stage));
  $("prev").disabled=state.stage===0;$("next").disabled=state.stage===STAGES.length-1;
}
function ctxFromInput(){
  let s=$("ctx").value.toLowerCase().replace(/[^a-z.]/g,"");s=("..."+s).slice(-BLOCK);
  state.ctx=[...s].map(ch=>STOI[ch]!==undefined?STOI[ch]:0);
  const top=forward(state.ctx).probs;const t=top.indexOf(Math.max(...top));
  $("params").innerHTML=`<span>ctx=<b>${s}</b></span><span>→ <b>${ITOS[t]==='.'?'·':ITOS[t]}</b> (${fx(top[t]*100,0)}%)</span>`;
}
function setPlayLabel(){$("play").innerHTML=RUNNING&&!PAUSED?"❚❚ Pause":"▶ Play";}
async function runSingle(id){RUN++;const run=RUN;RUNNING=true;PAUSED=false;SKIP=false;state.stage=id;setPlayLabel();
  try{await animateStage(id,run);}catch(e){if(e!=="cancel")console.error(e);if(run===RUN){RUNNING=false;setPlayLabel();}return;}
  if(run===RUN){RUNNING=false;setPlayLabel();}}
function skipStage(){RUN++;const run=RUN;SKIP=true;RUNNING=false;PAUSED=false;setPlayLabel();animateStage(state.stage,run).catch(()=>{}).then(()=>{if(run===RUN)SKIP=false;});}
async function playAll(){RUN++;const run=RUN;RUNNING=true;PAUSED=false;SKIP=false;setPlayLabel();
  try{for(let s=state.stage;s<STAGES.length;s++){state.stage=s;renderNav();syncHash();await animateStage(s,run);if(run!==RUN)return;if(s<STAGES.length-1)await step(560,run);}}catch(e){return;}
  if(run===RUN){RUNNING=false;PAUSED=false;setPlayLabel();}}
function onPlay(){if(RUNNING){PAUSED=!PAUSED;setPlayLabel();return;}if(state.stage===12){runSingle(12);return;}if(state.stage===STAGES.length-1)state.stage=0;playAll();}
function jumpStage(id){RUN++;state.stage=id;renderNav();syncHash();runSingle(id);}
function gotoPrev(){if(state.stage>0)jumpStage(state.stage-1);}
function gotoNext(){if(state.stage<STAGES.length-1)jumpStage(state.stage+1);}
function syncHash(){try{history.replaceState(null,"",`#st=${state.stage}&c=${encodeURIComponent($("ctx").value)}`);}catch(e){}}
function readHash(){try{const r=location.hash.replace(/^#/,"");if(!r)return null;const p={};r.split("&").forEach(kv=>{const i=kv.indexOf("=");if(i>0)p[kv.slice(0,i)]=decodeURIComponent(kv.slice(i+1));});return p;}catch(e){return null;}}

/* ---- export ---- */
let recording=false,_gw=null;const BG=()=>getComputedStyle(document.body).backgroundColor||"#0A0D13";const APP=()=>document.querySelector(".app");
function expStat(m,e){const x=$("expstat");if(!x)return;if(!m){x.style.display="none";return;}x.style.display="";x.classList.toggle("err",!!e);x.textContent=m;}
function dl(b,n){const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=n;a.click();setTimeout(()=>URL.revokeObjectURL(u),5000);}
function drawContain(c,img,W,H){const s=Math.min(W/img.width,H/img.height),w=img.width*s,h=img.height*s;c.drawImage(img,(W-w)/2,(H-h)/2,w,h);}
function resetExp(){["expgif","exppng"].forEach(id=>{const b=$(id);if(b){b.disabled=false;b.classList.remove("rec");}});}
async function gwURL(){if(_gw)return _gw;const r=await fetch("https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js");_gw=URL.createObjectURL(new Blob([await r.text()],{type:"application/javascript"}));return _gw;}
async function snapPNG(){if(!window.htmlToImage){expStat("capture lib not loaded",true);return;}expStat("rendering PNG…");try{const d=await htmlToImage.toPng(APP(),{pixelRatio:1.5,backgroundColor:BG()});dl(await(await fetch(d)).blob(),`mlp-bn-${Date.now()}.png`);expStat("PNG downloaded.");}catch(e){expStat("failed: "+(e.message||e),true);}}
async function recordGIF(){if(recording)return;if(!window.GIF||!window.htmlToImage){expStat("export lib not loaded",true);return;}
  recording=true;PAUSED=false;SKIP=false;$("expgif").disabled=$("exppng").disabled=true;$("expgif").classList.add("rec");expStat("preparing…");
  let wu;try{wu=await gwURL();}catch(e){expStat("worker load failed",true);recording=false;resetExp();return;}
  const node=APP(),rect=node.getBoundingClientRect(),W=Math.min(1000,Math.round(rect.width)),scale=W/rect.width,H=Math.min(1300,Math.round(rect.height*scale));
  const fr=document.createElement("canvas");fr.width=W;fr.height=H;const fc=fr.getContext("2d");
  const gif=new GIF({workers:2,quality:12,width:W,height:H,workerScript:wu,background:"#0A0D13"});
  let cap=true,frames=0,last=performance.now();
  const loop=(async()=>{while(cap){try{const snap=await htmlToImage.toCanvas(node,{pixelRatio:scale,backgroundColor:BG()});fc.fillStyle=BG();fc.fillRect(0,0,W,H);drawContain(fc,snap,W,H);const now=performance.now(),delay=Math.max(60,Math.min(400,Math.round(now-last)));last=now;gif.addFrame(fc,{copy:true,delay});frames++;if(frames%4===0)expStat(`capturing… ${frames}`);}catch(e){}await sleep(110);}})();
  RUN++;const r=RUN;expStat("recording…");try{await animateStage(state.stage,r);}catch(e){}await sleep(450);cap=false;await loop;
  if(!frames){expStat("no frames (try Chrome)",true);recording=false;resetExp();return;}
  expStat(`encoding… ${frames} frames`);gif.on("progress",p=>expStat(`encoding… ${Math.round(p*100)}%`));
  gif.on("finished",b=>{recording=false;resetExp();expStat(`done — ${(b.size/1048576).toFixed(1)} MB`);dl(b,`mlp-bn-${Date.now()}.gif`);});gif.render();}

/* ---- wiring ---- */
$("ctx").addEventListener("input",()=>{ctxFromInput();if(state.stage>=2&&state.stage<=9)runSingle(state.stage);else syncHash();});
$("play").onclick=onPlay;$("prev").onclick=gotoPrev;$("next").onclick=gotoNext;$("skip").onclick=skipStage;$("replay").onclick=()=>jumpStage(state.stage);
$("speed").querySelectorAll("button").forEach(b=>b.onclick=()=>{SPEED=+b.dataset.s;$("speed").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));});
$("expgif").onclick=recordGIF;$("exppng").onclick=snapPNG;
$("copylink").onclick=()=>{const b=$("copylink");const done=()=>{b.classList.add("copied");b.textContent="✓ copied";setTimeout(()=>{b.classList.remove("copied");b.textContent="🔗 Copy link";},1600);};try{navigator.clipboard.writeText(location.href).then(done,done);}catch(e){done();}};
document.addEventListener("keydown",e=>{if(e.target.tagName==="INPUT")return;if(e.key==="ArrowLeft")gotoPrev();if(e.key==="ArrowRight")gotoNext();if(e.key===" "){e.preventDefault();onPlay();}if(e.key==="Enter")skipStage();});

function boot(){if(!window.katex){setTimeout(boot,60);return;}
  const p=readHash();if(p&&p.c!=null)$("ctx").value=p.c;
  ctxFromInput();renderNav();setPlayLabel();
  const st=p&&p.st!=null?+p.st:0;state.stage=(st>=0&&st<STAGES.length)?st:0;runSingle(state.stage);}
boot();
</script>
